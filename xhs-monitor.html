<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>评论截流监控</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #243032;
      --muted: #718084;
      --line: #e1d8ca;
      --panel: #fffdf9;
      --accent: #c95235;
      --accent-soft: #fff0e8;
      --green: #1f7a5c;
      --shadow: 0 16px 38px rgba(79, 55, 35, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.74), rgba(247,244,239,.96)),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px max(26px, env(safe-area-inset-bottom));
    }

    .hero {
      padding: 20px 4px 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(201,82,53,.22);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(31,122,92,.12);
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0 14px;
    }

    .metric, .card {
      border: 1px solid var(--line);
      background: rgba(255,253,249,.9);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .metric {
      padding: 13px 14px;
      min-height: 78px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .value {
      margin-top: 7px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      word-break: break-word;
    }

    .section-title {
      margin: 22px 4px 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .platform-tabs,
    .category-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .platform-tabs {
      margin-top: 0;
    }

    .platform-button,
    .category-button {
      min-height: 48px;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(79, 55, 35, .08);
    }

    .platform-button.active,
    .category-button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .add-panel {
      padding: 15px;
      margin: 14px 0 6px;
      border: 1px solid rgba(201,82,53,.22);
      background: linear-gradient(180deg, #fff9f5, #fffdf9);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    input[type="url"] {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      outline: none;
    }

    input[type="url"]:focus {
      border-color: rgba(201,82,53,.72);
      box-shadow: 0 0 0 4px rgba(201,82,53,.12);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 900;
    }

    button:disabled {
      opacity: .68;
    }

    .form-message {
      margin-top: 10px;
      min-height: 22px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .form-message.error { color: #b3261e; font-weight: 800; }
    .form-message.ok { color: var(--green); font-weight: 800; }

    .auth-panel {
      padding: 16px;
      margin: 10px 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    .auth-grid input,
    .user-grid input,
    .user-grid select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .account-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .account-actions { display: flex; gap: 8px; }
    .account-actions button { min-height: 38px; padding: 0 12px; }

    .user-panel {
      margin: 0 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .user-panel summary { padding: 13px 14px; cursor: pointer; font-weight: 900; }
    .user-panel-body { padding: 0 14px 14px; }
    .user-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .user-grid button { grid-column: 1 / -1; }
    .user-list { display: grid; gap: 7px; margin-top: 12px; }
    .user-row { padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; }

    .sync-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .pending-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .pending-item {
      display: grid;
      gap: 5px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-all;
    }

    .card {
      padding: 15px;
      margin: 10px 0;
    }

    .alert-card {
      border-color: rgba(201,82,53,.26);
      background: linear-gradient(180deg, #fff9f5, #fffdf9);
    }

    .alert-card.alert-warning {
      border-color: rgba(194,137,24,.38);
      background: linear-gradient(180deg, #fffbed, #fffef9);
    }

    .alert-card.alert-muted {
      border-color: #d7dcdb;
      background: #f7f8f8;
      box-shadow: none;
    }

    .alerts-panel {
      border: 1px solid rgba(201,82,53,.24);
      border-radius: 8px;
      background: rgba(255,253,249,.82);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .alerts-panel summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 15px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      list-style: none;
    }

    .alerts-panel summary::-webkit-details-marker { display: none; }

    .alerts-body {
      padding: 0 15px 12px;
    }

    .hot-label {
      color: #b3261e;
      font-weight: 900;
    }

    .post-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 900;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
    }

    .comment {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f7faf8;
      border: 1px solid #dbe9e1;
    }

    .comment.hot-comment {
      background: #fff1ef;
      border-color: rgba(179,38,30,.42);
      color: #8c1d18;
    }

    .comment.hot-comment .pill {
      border-color: rgba(179,38,30,.28);
      color: #8c1d18;
    }

    .comment.warning-comment {
      background: #fff8e5;
      border-color: rgba(181,126,16,.42);
      color: #745000;
    }

    .comment.warning-comment .pill {
      border-color: rgba(181,126,16,.3);
      color: #745000;
    }

    .comment.muted-comment {
      background: #f2f4f4;
      border-color: #d4dada;
      color: #657171;
    }

    .comment.muted-comment .pill {
      border-color: #d4dada;
      color: #657171;
      background: #fff;
    }

    .comment strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .comment p {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
    }

    .link-row {
      display: flex;
      gap: 10px;
      margin-top: 13px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 13px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }

    .ghost {
      background: #fff !important;
      color: var(--ink) !important;
      border: 1px solid var(--line);
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,255,255,.62);
      line-height: 1.7;
    }

    .footer {
      margin-top: 22px;
      padding: 12px 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 430px) {
      .summary { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr; }
      .link-row { flex-direction: column; }
      a.button { width: 100%; }
      .page { padding-left: 12px; padding-right: 12px; }
      .auth-grid, .user-grid { grid-template-columns: 1fr; }
      .user-grid button { grid-column: auto; }
      .account-bar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow"><span class="dot"></span><span id="eyebrowText">评论截流监控</span></div>
      <h1 id="heroTitle">新客户评论提醒</h1>
      <p class="sub" id="heroSub">手机微信可打开查看。页面显示最近一次监控结果，发现新评论时会在“最新提醒”里置顶。</p>
    </section>

    <section id="loginPanel" class="auth-panel">
      <h2 class="post-title">管理账号登录</h2>
      <div class="auth-grid">
        <input id="loginUsername" autocomplete="username" placeholder="账号">
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="密码">
        <button id="loginButton" type="button">登录</button>
      </div>
      <div id="loginMessage" class="form-message">登录后按账号权限开放查看、添加和账号管理功能。</div>
    </section>

    <div id="monitorApp" hidden>
    <section id="accountBar" class="account-bar">
      <div><strong id="accountName">管理账号</strong><div class="label" id="accountRole"></div></div>
      <div class="account-actions"><button id="logoutButton" class="ghost" type="button">退出</button></div>
    </section>

    <details id="userPanel" class="user-panel" hidden>
      <summary>账号与权限管理</summary>
      <div class="user-panel-body">
        <div class="user-grid">
          <input id="userUsername" placeholder="新账号（英文或数字）">
          <input id="userDisplayName" placeholder="显示名称">
          <select id="userRole">
            <option value="operator">运营：查看和新增</option>
            <option value="viewer">只读：仅查看</option>
            <option value="admin">管理员：全部权限</option>
          </select>
          <input id="userPassword" type="password" autocomplete="new-password" placeholder="初始密码（至少8位）">
          <button id="saveUserButton" type="button">创建账号</button>
        </div>
        <div id="userMessage" class="form-message"></div>
        <div id="userList" class="user-list"></div>
      </div>
    </details>

    <section id="platformTabs" class="platform-tabs" aria-label="监控平台"></section>

    <section class="summary">
      <div class="metric">
        <div class="label">最近检查</div>
        <div class="value" id="checkedAt">读取中</div>
      </div>
      <div class="metric">
        <div class="label">监控帖子</div>
        <div class="value" id="postCount">读取中</div>
      </div>
      <div class="metric">
        <div class="label">本轮覆盖</div>
        <div class="value" id="coverageCount">读取中</div>
      </div>
    </section>

    <section id="categoryTabs" class="category-tabs" aria-label="监控分组"></section>

    <section class="add-panel">
      <h2 class="post-title">新增监控链接</h2>
      <div class="input-row">
        <input id="newLinkInput" type="url" inputmode="url" placeholder="粘贴监控链接">
        <button id="addLinkButton" type="button">确认</button>
      </div>
      <div id="linkMessage" class="form-message"></div>
      <div class="sync-note">手机微信提交后会立即显示在当前列表；页面会自动刷新最新监控数据，不展示后台错误内容。</div>
      <div id="pendingLinks" class="pending-list"></div>
    </section>

    <h2 class="section-title">最新提醒</h2>
    <section id="alerts"></section>

    <h2 class="section-title">监控列表</h2>
    <section id="posts"></section>

    <div class="footer" id="pageFooter">
      说明：微信网页本身不能直接绕过平台限制抓评论，数据来自监控服务的最近一次检查。评论和提醒均保留最近 24 小时并默认折叠：1 小时内红色、1 至 4 小时黄色、4 小时以上灰色。
    </div>
    </div>
  </main>

  <script src="./xhs-monitor-data.js"></script>
  <script src="./douyin-monitor-data.js"></script>
  <script>
    const pageVersion = "2026-07-19-account-v1";
    const refreshIntervalMs = 30 * 1000;
    const apiBase = location.hostname === "hailing-quote-x81y.vercel.app"
      ? ""
      : "https://hailing-quote-x81y.vercel.app";
    const authStorageKey = "monitor-management-session-v1";
    let session = (() => {
      try { return JSON.parse(localStorage.getItem(authStorageKey) || "null"); }
      catch { return null; }
    })();
    const serverStateByPlatform = { xhs: null, douyin: null };
    const dataByPlatform = {
      xhs: window.XHS_MONITOR_DATA || {},
      douyin: window.DOUYIN_MONITOR_DATA || {},
    };
    const platformConfigs = {
      xhs: {
        label: "小红书",
        eyebrow: "小红书评论监控",
        title: "新客户评论提醒",
        sub: "手机微信可打开查看。页面显示最近一次小红书监控结果，发现新评论时会在“最新提醒”里置顶。",
        addTitle: "新增小红书监控链接",
        placeholder: "粘贴小红书笔记链接",
        endpoint: `${apiBase}/api/xhs-add`,
        directBackend: true,
        pendingKey: "xhs-monitor-pending-links",
        linkName: "小红书",
        supportedText: "只支持小红书或 xhslink 链接。",
        hostOk: (host) => /(^|\.)xiaohongshu\.com$/i.test(host) || /(^|\.)xhslink\.com$/i.test(host),
      },
      douyin: {
        label: "抖音截流",
        eyebrow: "抖音截流监控",
        title: "抖音客户截流提醒",
        sub: "手机微信可打开查看。抖音截流链接单独接入，后续提醒和列表会在这里归档。",
        addTitle: "新增抖音截流链接",
        placeholder: "粘贴抖音作品或分享链接",
        endpoint: `${apiBase}/api/douyin-add`,
        directBackend: true,
        pendingKey: "douyin-monitor-pending-links",
        linkName: "抖音",
        supportedText: "只支持抖音或 douyin 链接。",
        hostOk: (host) => /(^|\.)douyin\.com$/i.test(host) || /(^|\.)iesdouyin\.com$/i.test(host),
      },
    };
    const roleLabels = { admin: "管理员", operator: "运营账号", viewer: "只读账号" };
    const hasPermission = (permission) => Boolean(session?.user?.permissions?.includes(permission));
    const requestId = () => `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    const apiFetch = async (path, options = {}, retries = 2) => {
      let lastError;
      for (let attempt = 0; attempt <= retries; attempt += 1) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        try {
          const response = await fetch(path, {
            ...options,
            cache: "no-store",
            headers: {
              ...(options.body ? { "Content-Type": "application/json" } : {}),
              ...(session?.token ? { Authorization: `Bearer ${session.token}` } : {}),
              "X-Request-Id": options.requestId || requestId(),
              ...(options.headers || {}),
            },
            signal: controller.signal,
          });
          clearTimeout(timeout);
          if (response.status === 401) {
            localStorage.removeItem(authStorageKey);
            session = null;
            updateAuthView();
          }
          if (response.status >= 500 && attempt < retries) {
            await new Promise((resolve) => setTimeout(resolve, 700 * (attempt + 1)));
            continue;
          }
          return response;
        } catch (error) {
          clearTimeout(timeout);
          lastError = error;
          if (attempt < retries) {
            await new Promise((resolve) => setTimeout(resolve, 700 * (attempt + 1)));
            continue;
          }
        }
      }
      throw lastError || new Error("网络连接失败");
    };
    const platformKeys = Object.keys(platformConfigs);
    const params = new URLSearchParams(location.search);
    let selectedPlatform = params.get("platform") || "xhs";
    if (!platformConfigs[selectedPlatform]) selectedPlatform = "xhs";
    const hotAlertMs = 60 * 60 * 1000;
    const alertRetentionMs = 24 * 60 * 60 * 1000;
    const listRetentionMs = 24 * 60 * 60 * 1000;
    const activeConfig = () => platformConfigs[selectedPlatform];
    const activeData = () => dataByPlatform[selectedPlatform] || {};
    const dataFileByPlatform = {
      xhs: "./xhs-monitor-data.js",
      douyin: "./douyin-monitor-data.js",
    };
    const linksFileByPlatform = {
      xhs: "./xhs-monitor-links.json",
      douyin: "./douyin-monitor-links.json",
    };
    const activeCategories = () => {
      const data = activeData();
      return data.categories?.length ? data.categories : ["海陵岛", "鼎龙湾"];
    };
    let selectedCategory = params.get("area") || activeCategories()[0] || "海陵岛";
    const normalizeSelectedCategory = () => {
      const categories = activeCategories();
      if (!categories.includes(selectedCategory)) selectedCategory = categories[0] || "海陵岛";
    };
    normalizeSelectedCategory();
    document.getElementById("pageFooter").textContent += ` 当前页面版本：${pageVersion}`;
    const fmt = (value) => {
      if (!value) return "暂无记录";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    };
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const commentMs = (comment) => Number(comment?.time_ms || 0);
    const withinMs = (comment, ms) => commentMs(comment) && Date.now() - commentMs(comment) <= ms;
    const isHotComment = (comment) => withinMs(comment, hotAlertMs);
    const isRecentAlert = (comment) => withinMs(comment, alertRetentionMs);
    const isRecentListComment = (comment) => withinMs(comment, listRetentionMs);
    const alertSeverity = (comment) => {
      const ageMs = Math.max(0, Date.now() - commentMs(comment));
      if (ageMs <= hotAlertMs) return "hot";
      if (ageMs < 4 * 60 * 60 * 1000) return "warning";
      return "muted";
    };
    const severityLabel = (severity) => ({
      hot: "1小时内新评论",
      warning: "1至4小时提醒",
      muted: "4小时以上提醒",
    }[severity] || "评论提醒");
    const renderComment = (comment, options = {}) => `
      <div class="comment ${options.severity === "hot" || options.hot ? "hot-comment" : ""} ${options.severity === "warning" ? "warning-comment" : ""} ${options.severity === "muted" ? "muted-comment" : ""}">
        <strong>${escapeHtml(comment.nickname || "未知用户")}</strong>
        <p>${escapeHtml(comment.content || "")}</p>
        <div class="meta">
          ${options.severity ? `<span class="pill ${options.severity === "hot" ? "hot-label" : ""}">${severityLabel(options.severity)}</span>` : options.hot ? `<span class="pill hot-label">1小时内新评论</span>` : ""}
          <span class="pill">时间：${escapeHtml(comment.time || "未知")}</span>
          <span class="pill">小红书号：${escapeHtml(comment.xhs_user_id || "页面未提供")}</span>
          <span class="pill">用户主页ID：${escapeHtml(comment.user_profile_id || comment.xhs_user_id || "页面未提供")}</span>
        </div>
        ${comment.user_profile_url ? `<div class="link-row"><a class="button ghost" href="${escapeHtml(comment.user_profile_url)}">打开用户主页</a></div>` : ""}
      </div>
    `;
    const normalizeLink = (value) => {
      const raw = String(value || "").trim();
      const match = raw.match(/https?:\/\/[^\s，,。]+/i);
      if (!match) return "";
      try {
        const url = new URL(match[0]);
        url.hash = "";
        return url.toString().replace(/\/$/, "");
      } catch {
        return "";
      }
    };
    const readPendingLinks = () => {
      try {
        const value = JSON.parse(localStorage.getItem(activeConfig().pendingKey) || "[]");
        return Array.isArray(value) ? value : [];
      } catch {
        localStorage.removeItem(activeConfig().pendingKey);
        return [];
      }
    };
    const remoteKnownLinks = () => [
      ...(activeData().posts || []).flatMap((post) => [post.url, post.final_url]),
      ...((serverStateByPlatform[selectedPlatform]?.links || []).map((post) => post.url)),
    ].filter(Boolean).map((url) => normalizeLink(url).toLowerCase());
    const knownLinks = () => [
      ...(activeData().posts || []).flatMap((post) => [post.url, post.final_url]),
      ...readPendingLinks().map((item) => item.url)
    ].filter(Boolean).map((url) => normalizeLink(url).toLowerCase());
    const pendingLinks = () => readPendingLinks();
    const setMessage = (text, type = "") => {
      const node = document.getElementById("linkMessage");
      node.textContent = text;
      node.className = `form-message ${type}`;
    };
    const savePendingLink = (url, category, status) => {
      const pending = pendingLinks();
      const next = [
        { url, category, createdAt: new Date().toISOString(), status, platform: selectedPlatform },
        ...pending.filter((item) => normalizeLink(item.url).toLowerCase() !== url.toLowerCase())
      ];
      localStorage.setItem(activeConfig().pendingKey, JSON.stringify(next.slice(0, 20)));
    };
    const renderPendingLinks = () => {
      const pending = pendingLinks();
      const current = pending.filter((item) => (item.category || selectedCategory) === selectedCategory);
      document.getElementById("pendingLinks").innerHTML = current.length ? current.map((item) => `
        <div class="pending-item">
          <strong>${escapeHtml(item.status || "待接入后台监控")}</strong>
          <span>${escapeHtml(item.url)}</span>
          <span>提交时间：${escapeHtml(fmt(item.createdAt))}</span>
        </div>
      `).join("") : "";
    };
    const reconcilePendingLinks = () => {
      const remote = new Set(remoteKnownLinks());
      const next = pendingLinks().filter((item) => !remote.has(normalizeLink(item.url).toLowerCase()));
      localStorage.setItem(activeConfig().pendingKey, JSON.stringify(next));
    };
    const renderCategoryTabs = () => {
      const categories = activeCategories();
      document.getElementById("categoryTabs").innerHTML = categories.map((category) => `
        <button class="category-button ${category === selectedCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
      `).join("");
      document.querySelectorAll(".category-button").forEach((button) => {
        button.addEventListener("click", () => {
          selectedCategory = button.dataset.category;
          const url = new URL(location.href);
          url.searchParams.set("area", selectedCategory);
          history.replaceState(null, "", url);
          renderPage();
        });
      });
    };
    const renderPlatformTabs = () => {
      document.getElementById("platformTabs").innerHTML = platformKeys.map((key) => `
        <button class="platform-button ${key === selectedPlatform ? "active" : ""}" type="button" data-platform="${escapeHtml(key)}">${escapeHtml(platformConfigs[key].label)}</button>
      `).join("");
      document.querySelectorAll(".platform-button").forEach((button) => {
        button.addEventListener("click", () => {
          selectedPlatform = button.dataset.platform;
          normalizeSelectedCategory();
          const url = new URL(location.href);
          url.searchParams.set("platform", selectedPlatform);
          url.searchParams.set("area", selectedCategory);
          history.replaceState(null, "", url);
          renderPage();
          refreshServerState();
        });
      });
    };
    const postCategory = (item) => item.category || "鼎龙湾";
    const categoryCode = () => selectedCategory === "海陵岛" ? "hailing" : "dinglong";
    const localPosts = (category = selectedCategory) => pendingLinks()
      .filter((item) => (item.category || category) === category)
      .filter((item) => !remoteKnownLinks().includes(normalizeLink(item.url).toLowerCase()))
      .map((item) => ({
        title: "新增监控帖子",
        url: item.url,
        final_url: item.url,
        category: item.category || category,
        last_checked: item.createdAt,
        last_count: 0,
        latest_comments: [],
        local_pending: true,
      }));
    const alertItems = (posts) => {
      const data = activeData();
      const byId = new Map();
      const add = (item) => {
        const id = item.id || `${item.url}-${item.content}-${item.time_ms}`;
        if (!id || byId.has(id)) return;
        byId.set(id, item);
      };
      [...(data.new_comments || []), ...(data.alert_history || [])]
        .filter((item) => postCategory(item) === selectedCategory)
        .filter(isRecentAlert)
        .forEach(add);
      posts.forEach((post) => {
        (post.latest_comments || []).filter(isRecentAlert).forEach((comment) => add({
          title: post.title,
          url: post.url,
          category: postCategory(post),
          ...comment,
        }));
      });
      return [...byId.values()].sort((a, b) => commentMs(b) - commentMs(a));
    };
    const renderPage = () => {
      normalizeSelectedCategory();
      const config = activeConfig();
      const data = activeData();
      const currentPosts = [
        ...(data.posts || []).filter((post) => postCategory(post) === selectedCategory),
        ...localPosts(selectedCategory),
      ];
      const currentAlerts = alertItems(currentPosts);
      const alertCounts = currentAlerts.reduce((counts, item) => {
        counts[alertSeverity(item)] += 1;
        return counts;
      }, { hot: 0, warning: 0, muted: 0 });
      renderPlatformTabs();
      renderCategoryTabs();
      document.getElementById("eyebrowText").textContent = config.eyebrow;
      document.getElementById("heroTitle").textContent = config.title;
      document.getElementById("heroSub").textContent = config.sub;
      document.getElementById("newLinkInput").placeholder = config.placeholder;
      document.querySelector(".add-panel").hidden = Boolean(session && !hasPermission("monitor:add"));
      document.getElementById("checkedAt").textContent = fmt(data.checked_at);
      const localCount = pendingLinks()
        .filter((item) => !remoteKnownLinks().includes(normalizeLink(item.url).toLowerCase()))
        .length;
      const serverCount = serverStateByPlatform[selectedPlatform]?.configured_count;
      const configuredCount = Number(serverCount ?? data.configured_count ?? (data.posts || []).length) + localCount;
      const checkedCount = Number(data.checked_count ?? (data.posts || []).length);
      document.getElementById("postCount").textContent = `${configuredCount} 条`;
      document.getElementById("coverageCount").textContent = `${checkedCount}/${configuredCount} 条`;
      document.querySelector(".add-panel .post-title").textContent = `${config.addTitle} - ${selectedCategory}`;
      document.getElementById("alerts").innerHTML = currentAlerts.length ? `
        <details class="alerts-panel">
          <summary>
            <span>${escapeHtml(selectedCategory)}最新提醒 ${currentAlerts.length} 条</span>
            <span class="${alertCounts.hot ? "hot-label" : ""}">${alertCounts.hot ? `红 ${alertCounts.hot} · 黄 ${alertCounts.warning} · 灰 ${alertCounts.muted}` : `黄 ${alertCounts.warning} · 灰 ${alertCounts.muted}`}</span>
          </summary>
          <div class="alerts-body">
            ${currentAlerts.map((item) => {
              const severity = alertSeverity(item);
              return `
              <article class="card alert-card ${severity === "warning" ? "alert-warning" : ""} ${severity === "muted" ? "alert-muted" : ""}">
                <h3 class="post-title">${escapeHtml(item.title || `${config.linkName}帖子`)}</h3>
                ${renderComment(item, { severity })}
                <div class="link-row">
                  <a class="button" href="${escapeHtml(item.url || "#")}">打开帖子</a>
                </div>
              </article>
            `;
            }).join("")}
          </div>
        </details>
      ` : `<div class="empty">${escapeHtml(selectedCategory)}最近 24 小时没有新的客户评论提醒。</div>`;

      document.getElementById("posts").innerHTML = currentPosts.length ? currentPosts.map((post) => `
        <article class="card">
          <h3 class="post-title">${escapeHtml(post.title)}</h3>
          <div class="meta">
            <span class="pill">${escapeHtml(postCategory(post))}</span>
            ${post.local_pending ? `<span class="pill hot-label">手机已保存，待后台同步</span>` : ""}
            <span class="pill">评论数：${escapeHtml(post.last_count ?? 0)}</span>
            <span class="pill">检查：${escapeHtml(fmt(post.last_checked))}</span>
          </div>
          ${(post.latest_comments || []).filter(isRecentListComment).slice(0, 2).map(renderComment).join("") || `<div class="comment"><p>最近 24 小时暂无可显示评论</p></div>`}
          <div class="link-row">
            <a class="button" href="${escapeHtml(post.url)}">打开帖子</a>
            <a class="button ghost" href="${escapeHtml(post.final_url || post.url)}">原始链接</a>
          </div>
        </article>
      `).join("") : `<div class="empty">${escapeHtml(selectedCategory)}还没有监控帖子。</div>`;
      renderPendingLinks();
    };
    const updateAuthView = () => {
      const loggedIn = Boolean(session?.token && session?.user);
      document.getElementById("loginPanel").hidden = loggedIn;
      document.getElementById("monitorApp").hidden = false;
      document.getElementById("accountBar").hidden = !loggedIn;
      document.getElementById("userPanel").hidden = !loggedIn || !hasPermission("users:manage");
      if (!loggedIn) {
        renderPage();
        return;
      }
      document.getElementById("accountName").textContent = session.user.displayName || session.user.username;
      document.getElementById("accountRole").textContent = `${roleLabels[session.user.role] || session.user.role} · ${session.user.username}`;
      renderPage();
    };
    const readJsonResponse = async (response) => {
      const raw = await response.text();
      try { return raw ? JSON.parse(raw) : {}; }
      catch { return { error: "后台返回内容无法识别" }; }
    };
    const login = async () => {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      const button = document.getElementById("loginButton");
      const message = document.getElementById("loginMessage");
      if (!username || !password) {
        message.textContent = "请输入账号和密码。";
        message.className = "form-message error";
        return;
      }
      button.disabled = true;
      button.textContent = "登录中";
      try {
        const response = await apiFetch(`${apiBase}/api/auth`, {
          method: "POST",
          body: JSON.stringify({ username, password }),
        }, 1);
        const result = await readJsonResponse(response);
        if (!response.ok) throw new Error(result.error || "登录失败");
        session = { token: result.token, user: result.user };
        localStorage.setItem(authStorageKey, JSON.stringify(session));
        document.getElementById("loginPassword").value = "";
        updateAuthView();
        await refreshServerState();
        await loadUsers();
      } catch (error) {
        message.textContent = error.name === "AbortError" ? "登录服务响应超时，请检查网络后重试。" : String(error.message || error);
        message.className = "form-message error";
      } finally {
        button.disabled = false;
        button.textContent = "登录";
      }
    };
    document.getElementById("loginButton").addEventListener("click", login);
    document.getElementById("loginPassword").addEventListener("keydown", (event) => {
      if (event.key === "Enter") login();
    });
    document.getElementById("logoutButton").addEventListener("click", () => {
      localStorage.removeItem(authStorageKey);
      session = null;
      updateAuthView();
    });

    const loadUsers = async () => {
      if (!hasPermission("users:manage")) return;
      try {
        const response = await apiFetch(`${apiBase}/api/users`, {}, 1);
        const result = await readJsonResponse(response);
        if (!response.ok) throw new Error(result.error || "账号列表读取失败");
        document.getElementById("userList").innerHTML = (result.users || []).map((user) => `
          <div class="user-row"><strong>${escapeHtml(user.displayName)}</strong> · ${escapeHtml(user.username)} · ${escapeHtml(roleLabels[user.role] || user.role)} · ${user.active ? "已启用" : "已停用"}</div>
        `).join("") || `<div class="label">暂时没有额外账号。</div>`;
      } catch (error) {
        document.getElementById("userMessage").textContent = String(error.message || error);
        document.getElementById("userMessage").className = "form-message error";
      }
    };
    document.getElementById("userPanel").addEventListener("toggle", (event) => {
      if (event.target.open) loadUsers();
    });
    document.getElementById("saveUserButton").addEventListener("click", async () => {
      const button = document.getElementById("saveUserButton");
      const message = document.getElementById("userMessage");
      const payload = {
        username: document.getElementById("userUsername").value.trim(),
        displayName: document.getElementById("userDisplayName").value.trim(),
        role: document.getElementById("userRole").value,
        password: document.getElementById("userPassword").value,
      };
      button.disabled = true;
      try {
        const response = await apiFetch(`${apiBase}/api/users`, { method: "POST", body: JSON.stringify(payload) }, 1);
        const result = await readJsonResponse(response);
        if (!response.ok) throw new Error(result.error || "账号创建失败");
        message.textContent = `账号 ${result.user.username} 已创建。`;
        message.className = "form-message ok";
        document.getElementById("userUsername").value = "";
        document.getElementById("userDisplayName").value = "";
        document.getElementById("userPassword").value = "";
        await loadUsers();
      } catch (error) {
        message.textContent = String(error.message || error);
        message.className = "form-message error";
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("addLinkButton").addEventListener("click", async () => {
      const input = document.getElementById("newLinkInput");
      const button = document.getElementById("addLinkButton");
      const url = normalizeLink(input.value);
      if (!url) {
        setMessage("链接格式不对，请粘贴完整的小红书链接。", "error");
        return;
      }
      const hostOk = activeConfig().hostOk(new URL(url).hostname);
      if (!hostOk) {
        setMessage(activeConfig().supportedText, "error");
        return;
      }
      if (knownLinks().includes(url.toLowerCase())) {
        setMessage("这个链接已经在监控列表或待接入列表里，不能重复添加。", "error");
        return;
      }
      button.disabled = true;
      button.textContent = "接入中";
      setMessage("正在写入并核验后台监控列表，请稍等。", "");
      try {
        const id = requestId();
        const response = await apiFetch(activeConfig().endpoint, {
          method: "POST",
          body: JSON.stringify({ url, title: input.value, category: categoryCode() }),
          requestId: id,
        }, 2);
        const result = await readJsonResponse(response);
        if (!response.ok) throw new Error(result.error || "后台接入失败");
        serverStateByPlatform[selectedPlatform] = {
          ...(serverStateByPlatform[selectedPlatform] || {}),
          configured_count: result.configured_count,
          links: [
            ...(serverStateByPlatform[selectedPlatform]?.links || []),
            result.post,
          ],
        };
        savePendingLink(url, selectedCategory, "后台已确认接入");
        reconcilePendingLinks();
        input.value = "";
        setMessage(`${result.message || "已接入后台监控"}，当前共 ${result.configured_count} 条。`, "ok");
        renderPage();
      } catch (error) {
        const message = error.name === "AbortError"
          ? "后台响应较慢，本次未确认接入，请勿重复提交，页面将自动核验。"
          : String(error.message || error);
        setMessage(message, "error");
        await refreshServerState();
      } finally {
        button.disabled = false;
        button.textContent = "确认";
      }
    });
    const parseMonitorPayload = (platform, text) => {
      const marker = platform === "xhs" ? "window.XHS_MONITOR_DATA = " : "window.DOUYIN_MONITOR_DATA = ";
      const start = text.indexOf(marker);
      if (start < 0) return null;
      const raw = text.slice(start + marker.length).replace(/;\s*$/, "").trim();
      return JSON.parse(raw);
    };
    const refreshRemoteData = async () => {
      if (location.protocol === "file:") return;
      const url = `${dataFileByPlatform[selectedPlatform]}?t=${Date.now()}`;
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) return;
        const payload = parseMonitorPayload(selectedPlatform, await response.text());
        if (!payload) return;
        dataByPlatform[selectedPlatform] = payload;
        renderPage();
      } catch {
        // Keep the current screen stable if the phone network blocks one refresh.
      }
    };
    const refreshServerState = async () => {
      if (!session?.token) return;
      const platform = selectedPlatform;
      try {
        const response = await apiFetch(platformConfigs[platform].endpoint, {}, 1);
        const result = await readJsonResponse(response);
        if (!response.ok) throw new Error(result.error || "监控数量核验失败");
        serverStateByPlatform[platform] = result;
        reconcilePendingLinks();
        renderPage();
      } catch (error) {
        if (session?.token) setMessage("监控服务正在自动重连，当前页面数据仍可查看。", "");
      }
    };
    const refreshConfiguredLinks = async () => {
      if (location.protocol === "file:") return;
      const platform = selectedPlatform;
      try {
        const response = await fetch(`${linksFileByPlatform[platform]}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return;
        const links = await response.json();
        if (!Array.isArray(links)) return;
        serverStateByPlatform[platform] = {
          ...(serverStateByPlatform[platform] || {}),
          configured_count: links.length,
          links,
        };
        reconcilePendingLinks();
        renderPage();
      } catch {
        // The last confirmed list remains visible during a temporary mobile network interruption.
      }
    };
    setInterval(refreshRemoteData, refreshIntervalMs);
    setInterval(refreshServerState, refreshIntervalMs);
    setInterval(refreshConfiguredLinks, refreshIntervalMs);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) refreshRemoteData();
    });
    window.addEventListener("focus", refreshRemoteData);
    updateAuthView();
    renderPage();
    refreshRemoteData();
    refreshConfiguredLinks();
    refreshServerState();
  </script>
</body>
</html>
