<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>评论截流监控</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #243032;
      --muted: #718084;
      --line: #e1d8ca;
      --panel: #fffdf9;
      --accent: #c95235;
      --accent-soft: #fff0e8;
      --green: #1f7a5c;
      --shadow: 0 16px 38px rgba(79, 55, 35, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.74), rgba(247,244,239,.96)),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px max(26px, env(safe-area-inset-bottom));
    }

    .hero {
      padding: 20px 4px 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(201,82,53,.22);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(31,122,92,.12);
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0 14px;
    }

    .metric, .card {
      border: 1px solid var(--line);
      background: rgba(255,253,249,.9);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .metric {
      padding: 13px 14px;
      min-height: 78px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .value {
      margin-top: 7px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      word-break: break-word;
    }

    .section-title {
      margin: 22px 4px 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .platform-tabs,
    .category-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .platform-tabs {
      margin-top: 0;
    }

    .platform-button,
    .category-button {
      min-height: 48px;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(79, 55, 35, .08);
    }

    .platform-button.active,
    .category-button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .add-panel {
      padding: 15px;
      margin: 14px 0 6px;
      border: 1px solid rgba(201,82,53,.22);
      background: linear-gradient(180deg, #fff9f5, #fffdf9);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    input[type="url"] {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      outline: none;
    }

    input[type="url"]:focus {
      border-color: rgba(201,82,53,.72);
      box-shadow: 0 0 0 4px rgba(201,82,53,.12);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 900;
    }

    button:disabled {
      opacity: .68;
    }

    .form-message {
      margin-top: 10px;
      min-height: 22px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .form-message.error { color: #b3261e; font-weight: 800; }
    .form-message.ok { color: var(--green); font-weight: 800; }

    .sync-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .pending-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .pending-item {
      display: grid;
      gap: 5px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-all;
    }

    .card {
      padding: 15px;
      margin: 10px 0;
    }

    .alert-card {
      border-color: rgba(201,82,53,.26);
      background: linear-gradient(180deg, #fff9f5, #fffdf9);
    }

    .alerts-panel {
      border: 1px solid rgba(201,82,53,.24);
      border-radius: 8px;
      background: rgba(255,253,249,.82);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .alerts-panel summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 15px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      list-style: none;
    }

    .alerts-panel summary::-webkit-details-marker { display: none; }

    .alerts-body {
      padding: 0 15px 12px;
    }

    .hot-label {
      color: #b3261e;
      font-weight: 900;
    }

    .post-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 900;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
    }

    .comment {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f7faf8;
      border: 1px solid #dbe9e1;
    }

    .comment.hot-comment {
      background: #fff1ef;
      border-color: rgba(179,38,30,.42);
      color: #8c1d18;
    }

    .comment.hot-comment .pill {
      border-color: rgba(179,38,30,.28);
      color: #8c1d18;
    }

    .comment strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .comment p {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
    }

    .link-row {
      display: flex;
      gap: 10px;
      margin-top: 13px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 13px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }

    .ghost {
      background: #fff !important;
      color: var(--ink) !important;
      border: 1px solid var(--line);
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,255,255,.62);
      line-height: 1.7;
    }

    .footer {
      margin-top: 22px;
      padding: 12px 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 430px) {
      .summary { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr; }
      .link-row { flex-direction: column; }
      a.button { width: 100%; }
      .page { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow"><span class="dot"></span><span id="eyebrowText">评论截流监控</span></div>
      <h1 id="heroTitle">新客户评论提醒</h1>
      <p class="sub" id="heroSub">手机微信可打开查看。页面显示最近一次监控结果，发现新评论时会在“最新提醒”里置顶。</p>
    </section>

    <section id="platformTabs" class="platform-tabs" aria-label="监控平台"></section>

    <section class="summary">
      <div class="metric">
        <div class="label">最近检查</div>
        <div class="value" id="checkedAt">读取中</div>
      </div>
      <div class="metric">
        <div class="label">监控帖子</div>
        <div class="value" id="postCount">读取中</div>
      </div>
      <div class="metric">
        <div class="label">本轮覆盖</div>
        <div class="value" id="coverageCount">读取中</div>
      </div>
    </section>

    <section id="categoryTabs" class="category-tabs" aria-label="监控分组"></section>

    <section class="add-panel">
      <h2 class="post-title">新增监控链接</h2>
      <div class="input-row">
        <input id="newLinkInput" type="url" inputmode="url" placeholder="粘贴监控链接">
        <button id="addLinkButton" type="button">确认</button>
      </div>
      <div id="linkMessage" class="form-message"></div>
      <div class="sync-note">手机微信提交会先保存到当前手机列表，避免后台域名被微信拦截造成超时；后台总表由同步服务接入后刷新。</div>
      <div id="pendingLinks" class="pending-list"></div>
    </section>

    <h2 class="section-title">最新提醒</h2>
    <section id="alerts"></section>

    <h2 class="section-title">监控列表</h2>
    <section id="posts"></section>

    <div class="footer" id="pageFooter">
      说明：微信网页本身不能直接绕过平台限制抓评论，数据来自监控服务的最近一次检查。页面只保留最近 24 小时评论，旧评论会自动清除。
    </div>
  </main>

  <script src="./xhs-monitor-data.js"></script>
  <script src="./douyin-monitor-data.js"></script>
  <script>
    const pageVersion = "2026-07-18-1625";
    const apiBase = location.hostname === "hailing-quote-x81y.vercel.app"
      ? ""
      : "https://hailing-quote-x81y.vercel.app";
    const dataByPlatform = {
      xhs: window.XHS_MONITOR_DATA || {},
      douyin: window.DOUYIN_MONITOR_DATA || {},
    };
    const platformConfigs = {
      xhs: {
        label: "小红书",
        eyebrow: "小红书评论监控",
        title: "新客户评论提醒",
        sub: "手机微信可打开查看。页面显示最近一次小红书监控结果，发现新评论时会在“最新提醒”里置顶。",
        addTitle: "新增小红书监控链接",
        placeholder: "粘贴小红书笔记链接",
        endpoint: `${apiBase}/api/xhs-add`,
        directBackend: location.hostname === "hailing-quote-x81y.vercel.app",
        pendingKey: "xhs-monitor-pending-links",
        linkName: "小红书",
        supportedText: "只支持小红书或 xhslink 链接。",
        hostOk: (host) => /(^|\.)xiaohongshu\.com$/i.test(host) || /(^|\.)xhslink\.com$/i.test(host),
      },
      douyin: {
        label: "抖音截流",
        eyebrow: "抖音截流监控",
        title: "抖音客户截流提醒",
        sub: "手机微信可打开查看。抖音截流链接单独接入，后续提醒和列表会在这里归档。",
        addTitle: "新增抖音截流链接",
        placeholder: "粘贴抖音作品或分享链接",
        endpoint: `${apiBase}/api/douyin-add`,
        directBackend: location.hostname === "hailing-quote-x81y.vercel.app",
        pendingKey: "douyin-monitor-pending-links",
        linkName: "抖音",
        supportedText: "只支持抖音或 douyin 链接。",
        hostOk: (host) => /(^|\.)douyin\.com$/i.test(host) || /(^|\.)iesdouyin\.com$/i.test(host),
      },
    };
    const platformKeys = Object.keys(platformConfigs);
    const params = new URLSearchParams(location.search);
    let selectedPlatform = params.get("platform") || "xhs";
    if (!platformConfigs[selectedPlatform]) selectedPlatform = "xhs";
    const hotAlertMs = 60 * 60 * 1000;
    const activeConfig = () => platformConfigs[selectedPlatform];
    const activeData = () => dataByPlatform[selectedPlatform] || {};
    const activeCategories = () => {
      const data = activeData();
      return data.categories?.length ? data.categories : ["海陵岛", "鼎龙湾"];
    };
    let selectedCategory = params.get("area") || activeCategories()[0] || "海陵岛";
    const normalizeSelectedCategory = () => {
      const categories = activeCategories();
      if (!categories.includes(selectedCategory)) selectedCategory = categories[0] || "海陵岛";
    };
    normalizeSelectedCategory();
    document.getElementById("pageFooter").textContent += ` 当前页面版本：${pageVersion}`;
    const fmt = (value) => {
      if (!value) return "暂无记录";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    };
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const commentMs = (comment) => Number(comment?.time_ms || 0);
    const isHotComment = (comment) => commentMs(comment) && Date.now() - commentMs(comment) <= hotAlertMs;
    const renderComment = (comment, options = {}) => `
      <div class="comment ${options.hot ? "hot-comment" : ""}">
        <strong>${escapeHtml(comment.nickname || "未知用户")}</strong>
        <p>${escapeHtml(comment.content || "")}</p>
        <div class="meta">
          ${options.hot ? `<span class="pill hot-label">1小时内新评论</span>` : ""}
          <span class="pill">时间：${escapeHtml(comment.time || "未知")}</span>
          <span class="pill">小红书号：${escapeHtml(comment.xhs_user_id || "页面未提供")}</span>
          <span class="pill">用户主页ID：${escapeHtml(comment.user_profile_id || comment.xhs_user_id || "页面未提供")}</span>
        </div>
        ${comment.user_profile_url ? `<div class="link-row"><a class="button ghost" href="${escapeHtml(comment.user_profile_url)}">打开用户主页</a></div>` : ""}
      </div>
    `;
    const normalizeLink = (value) => {
      const raw = String(value || "").trim();
      const match = raw.match(/https?:\/\/[^\s，,。]+/i);
      if (!match) return "";
      try {
        const url = new URL(match[0]);
        url.hash = "";
        return url.toString().replace(/\/$/, "");
      } catch {
        return "";
      }
    };
    const remoteKnownLinks = () => [
      ...(activeData().posts || []).flatMap((post) => [post.url, post.final_url]),
    ].filter(Boolean).map((url) => normalizeLink(url).toLowerCase());
    const knownLinks = () => [
      ...(activeData().posts || []).flatMap((post) => [post.url, post.final_url]),
      ...JSON.parse(localStorage.getItem(activeConfig().pendingKey) || "[]").map((item) => item.url)
    ].filter(Boolean).map((url) => normalizeLink(url).toLowerCase());
    const pendingLinks = () => JSON.parse(localStorage.getItem(activeConfig().pendingKey) || "[]");
    const setMessage = (text, type = "") => {
      const node = document.getElementById("linkMessage");
      node.textContent = text;
      node.className = `form-message ${type}`;
    };
    const savePendingLink = (url, category, status) => {
      const pending = pendingLinks();
      const next = [
        { url, category, createdAt: new Date().toISOString(), status },
        ...pending.filter((item) => normalizeLink(item.url).toLowerCase() !== url.toLowerCase())
      ];
      localStorage.setItem(activeConfig().pendingKey, JSON.stringify(next.slice(0, 20)));
    };
    const renderPendingLinks = () => {
      const pending = pendingLinks();
      const current = pending.filter((item) => (item.category || selectedCategory) === selectedCategory);
      document.getElementById("pendingLinks").innerHTML = current.length ? current.map((item) => `
        <div class="pending-item">
          <strong>${escapeHtml(item.status || "待接入后台监控")}</strong>
          <span>${escapeHtml(item.url)}</span>
          <span>提交时间：${escapeHtml(fmt(item.createdAt))}</span>
        </div>
      `).join("") : "";
    };
    const renderCategoryTabs = () => {
      const categories = activeCategories();
      document.getElementById("categoryTabs").innerHTML = categories.map((category) => `
        <button class="category-button ${category === selectedCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
      `).join("");
      document.querySelectorAll(".category-button").forEach((button) => {
        button.addEventListener("click", () => {
          selectedCategory = button.dataset.category;
          const url = new URL(location.href);
          url.searchParams.set("area", selectedCategory);
          history.replaceState(null, "", url);
          renderPage();
        });
      });
    };
    const renderPlatformTabs = () => {
      document.getElementById("platformTabs").innerHTML = platformKeys.map((key) => `
        <button class="platform-button ${key === selectedPlatform ? "active" : ""}" type="button" data-platform="${escapeHtml(key)}">${escapeHtml(platformConfigs[key].label)}</button>
      `).join("");
      document.querySelectorAll(".platform-button").forEach((button) => {
        button.addEventListener("click", () => {
          selectedPlatform = button.dataset.platform;
          normalizeSelectedCategory();
          const url = new URL(location.href);
          url.searchParams.set("platform", selectedPlatform);
          url.searchParams.set("area", selectedCategory);
          history.replaceState(null, "", url);
          renderPage();
        });
      });
    };
    const postCategory = (item) => item.category || "鼎龙湾";
    const categoryCode = () => selectedCategory === "海陵岛" ? "hailing" : "dinglong";
    const localPosts = () => pendingLinks()
      .filter((item) => (item.category || selectedCategory) === selectedCategory)
      .filter((item) => !remoteKnownLinks().includes(normalizeLink(item.url).toLowerCase()))
      .map((item) => ({
        title: "新增监控帖子",
        url: item.url,
        final_url: item.url,
        category: item.category || selectedCategory,
        last_checked: item.createdAt,
        last_count: 0,
        latest_comments: [],
        local_pending: true,
      }));
    const alertItems = (posts) => {
      const data = activeData();
      const byId = new Map();
      const add = (item) => {
        const id = item.id || `${item.url}-${item.content}-${item.time_ms}`;
        if (!id || byId.has(id)) return;
        byId.set(id, item);
      };
      [...(data.new_comments || []), ...(data.alert_history || [])]
        .filter((item) => postCategory(item) === selectedCategory)
        .forEach(add);
      posts.forEach((post) => {
        (post.latest_comments || []).forEach((comment) => add({
          title: post.title,
          url: post.url,
          category: postCategory(post),
          ...comment,
        }));
      });
      return [...byId.values()].sort((a, b) => commentMs(b) - commentMs(a));
    };
    const renderPage = () => {
      normalizeSelectedCategory();
      const config = activeConfig();
      const data = activeData();
      const currentPosts = [
        ...(data.posts || []).filter((post) => postCategory(post) === selectedCategory),
        ...localPosts(),
      ];
      const currentAlerts = alertItems(currentPosts);
      const hotAlerts = currentAlerts.filter(isHotComment);
      renderPlatformTabs();
      renderCategoryTabs();
      document.getElementById("eyebrowText").textContent = config.eyebrow;
      document.getElementById("heroTitle").textContent = config.title;
      document.getElementById("heroSub").textContent = config.sub;
      document.getElementById("newLinkInput").placeholder = config.placeholder;
      document.getElementById("checkedAt").textContent = fmt(data.checked_at);
      document.getElementById("postCount").textContent = `${currentPosts.length} 条`;
      const localCount = localPosts().length;
      const configuredCount = Number(data.configured_count ?? (data.posts || []).length) + localCount;
      const checkedCount = Number(data.checked_count ?? (data.posts || []).length);
      document.getElementById("coverageCount").textContent = `${checkedCount}/${configuredCount} 条`;
      document.querySelector(".add-panel .post-title").textContent = `${config.addTitle} - ${selectedCategory}`;
      document.getElementById("alerts").innerHTML = currentAlerts.length ? `
        <details class="alerts-panel" ${hotAlerts.length ? "open" : ""}>
          <summary>
            <span>${escapeHtml(selectedCategory)}最新评论 ${currentAlerts.length} 条</span>
            <span class="${hotAlerts.length ? "hot-label" : ""}">${hotAlerts.length ? `1小时内 ${hotAlerts.length} 条` : "点击展开"}</span>
          </summary>
          <div class="alerts-body">
            ${currentAlerts.map((item) => `
              <article class="card alert-card">
                <h3 class="post-title">${escapeHtml(item.title || `${config.linkName}帖子`)}</h3>
                ${renderComment(item, { hot: isHotComment(item) })}
                <div class="link-row">
                  <a class="button" href="${escapeHtml(item.url || "#")}">打开帖子</a>
                </div>
              </article>
            `).join("")}
          </div>
        </details>
      ` : `<div class="empty">${escapeHtml(selectedCategory)}当前没有可显示的客户评论。页面会保留最近一次检查状态，等有新评论时这里会置顶显示。</div>`;

      document.getElementById("posts").innerHTML = currentPosts.length ? currentPosts.map((post) => `
        <article class="card">
          <h3 class="post-title">${escapeHtml(post.title)}</h3>
          <div class="meta">
            <span class="pill">${escapeHtml(postCategory(post))}</span>
            ${post.local_pending ? `<span class="pill hot-label">手机已保存，待后台同步</span>` : ""}
            <span class="pill">评论数：${escapeHtml(post.last_count ?? 0)}</span>
            <span class="pill">检查：${escapeHtml(fmt(post.last_checked))}</span>
          </div>
          ${(post.latest_comments || []).slice(0, 2).map(renderComment).join("") || `<div class="comment"><p>暂无可显示评论</p></div>`}
          <div class="link-row">
            <a class="button" href="${escapeHtml(post.url)}">打开帖子</a>
            <a class="button ghost" href="${escapeHtml(post.final_url || post.url)}">原始链接</a>
          </div>
        </article>
      `).join("") : `<div class="empty">${escapeHtml(selectedCategory)}还没有监控帖子。</div>`;
      renderPendingLinks();
    };
    document.getElementById("addLinkButton").addEventListener("click", async () => {
      const input = document.getElementById("newLinkInput");
      const button = document.getElementById("addLinkButton");
      const url = normalizeLink(input.value);
      if (!url) {
        setMessage("链接格式不对，请粘贴完整的小红书链接。", "error");
        return;
      }
      const hostOk = activeConfig().hostOk(new URL(url).hostname);
      if (!hostOk) {
        setMessage(activeConfig().supportedText, "error");
        return;
      }
      if (knownLinks().includes(url.toLowerCase())) {
        setMessage("这个链接已经在监控列表或待接入列表里，不能重复添加。", "error");
        return;
      }
      button.disabled = true;
      button.textContent = "保存中";
      if (!activeConfig().directBackend) {
        savePendingLink(url, selectedCategory, "手机已保存，待后台同步");
        input.value = "";
        setMessage(`已保存到手机列表，不再等待后台接口，避免微信超时。版本：${pageVersion}`, "ok");
        renderPage();
        button.disabled = false;
        button.textContent = "确认";
        return;
      }
      setMessage(`正在接入后台，请稍等。版本：${pageVersion}`, "");
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        const response = await fetch(activeConfig().endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, category: categoryCode() }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        const raw = await response.text();
        let result = {};
        try {
          result = raw ? JSON.parse(raw) : {};
        } catch {
          result = { error: raw.slice(0, 120) };
        }
        if (!response.ok) {
          savePendingLink(url, selectedCategory, "已保存到手机待接入");
          setMessage(result.error ? `后台未完成：${result.error}。链接已先保存到手机待接入。` : "后台未完成：没有返回具体原因。链接已先保存到手机待接入。", "error");
          renderPendingLinks();
          return;
        }
        savePendingLink(url, selectedCategory, "已接入后台监控");
        input.value = "";
        setMessage(result.message || "已接入后台监控。", "ok");
        renderPendingLinks();
      } catch (error) {
        savePendingLink(url, selectedCategory, "已保存到手机待接入");
        const message = error && error.name === "AbortError"
          ? "后台响应超时，链接已先保存到手机待同步。"
          : `后台接口暂时不可用：${(error && error.message) || "网络请求失败"}。链接已先保存到手机待接入。`;
        setMessage(message, "error");
        renderPendingLinks();
      } finally {
        button.disabled = false;
        button.textContent = "确认";
      }
    });
    renderPage();
  </script>
</body>
</html>
