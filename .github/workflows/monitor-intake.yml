name: Monitor link intake

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  add-monitor-link:
    if: startsWith(github.event.issue.title, '[监控接入]')
    runs-on: ubuntu-latest
    steps:
      - name: Validate and add monitor link
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const platform = (body.match(/^平台：(.+)$/m) || [])[1]?.trim();
            const category = (body.match(/^分组：(.+)$/m) || [])[1]?.trim();
            const url = (body.match(/^链接：(https?:\/\/\S+)$/m) || [])[1]?.trim();
            const isXhs = platform === '小红书' && /(^|\.)((xhslink|xiaohongshu)\.com)$/i.test(new URL(url || 'https://invalid.local').hostname);
            const isDouyin = platform === '抖音' && /(^|\.)(douyin\.com|iesdouyin\.com)$/i.test(new URL(url || 'https://invalid.local').hostname);
            if (!url || !['海陵岛', '鼎龙湾'].includes(category) || (!isXhs && !isDouyin)) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: '提交内容无法识别，请从监控页面重新生成备用提交。' });
              return;
            }
            const path = isXhs ? 'xhs-monitor-links.json' : 'douyin-monitor-links.json';
            const branch = context.payload.repository.default_branch;
            for (let attempt = 0; attempt < 4; attempt += 1) {
              const file = await github.rest.repos.getContent({ ...context.repo, path, ref: branch });
              const links = JSON.parse(Buffer.from(file.data.content, 'base64').toString('utf8'));
              const normalized = value => String(value || '').replace(/\/$/, '').toLowerCase();
              if (links.some(item => normalized(item.url) === normalized(url))) {
                await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: `该链接已在监控列表中，当前共 ${links.length} 条。` });
                await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });
                return;
              }
              const title = `${category}${isXhs ? '新增监控帖子' : '抖音截流链接'}`;
              links.push({ title, url, category });
              try {
                await github.rest.repos.createOrUpdateFileContents({
                  ...context.repo,
                  path,
                  branch,
                  sha: file.data.sha,
                  message: `Add ${platform} monitor link from mobile`,
                  content: Buffer.from(`${JSON.stringify(links, null, 2)}\n`).toString('base64'),
                });
                await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: `已接入监控，当前共 ${links.length} 条。页面会在下一次刷新时同步。` });
                await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });
                return;
              } catch (error) {
                if (error.status !== 409 || attempt === 3) throw error;
              }
            }
