<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d5963" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>海陵岛查房报价</title>
    <style>
:root {
  color-scheme: light;
  --ink: #14212a;
  --muted: #627380;
  --line: #d6e2e6;
  --panel: #ffffff;
  --wash: #eef6f5;
  --aqua: #147d89;
  --aqua-dark: #0d5963;
  --sun: #f0a14a;
  --leaf: #3f7d55;
  --coral: #c96346;
  --danger: #b84d35;
  --sand: #f6eddc;
  --shadow: 0 18px 46px rgba(17, 39, 51, 0.13);
  --soft-shadow: 0 10px 24px rgba(22, 48, 60, 0.08);
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--ink);
  font-family:
    Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0 150px, transparent 151px),
    linear-gradient(135deg, #edf7f6 0%, #f8f5ed 45%, #eef5f7 100%);
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

button,
input,
select {
  font: inherit;
}

button,
a,
select,
input {
  -webkit-tap-highlight-color: transparent;
}

.shell {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding: 22px 24px 32px;
}

.topbar {
  position: relative;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  min-height: 176px;
  margin-bottom: 18px;
  padding: 30px 32px;
  border: 1px solid rgba(255, 255, 255, 0.68);
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(circle at 82% 28%, rgba(255, 230, 182, 0.56) 0 11%, transparent 12%),
    radial-gradient(ellipse at 76% 78%, rgba(255, 255, 255, 0.42) 0 9%, transparent 10%),
    linear-gradient(170deg, rgba(255, 255, 255, 0.18) 0 20%, transparent 21% 100%),
    linear-gradient(90deg, rgba(9, 63, 72, 0.94) 0%, rgba(20, 125, 137, 0.82) 50%, rgba(240, 161, 74, 0.42) 100%),
    linear-gradient(135deg, #0c5b68, #69b7bd 55%, #f2c68c);
  box-shadow: var(--shadow);
  isolation: isolate;
}

.topbar::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 56px;
  background:
    linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.22)),
    repeating-linear-gradient(175deg, rgba(255, 255, 255, 0.3) 0 2px, transparent 2px 18px);
  z-index: -1;
}

.eyebrow {
  margin: 0 0 6px;
  color: #d7f5f2;
  font-size: 13px;
  font-weight: 700;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 56px;
  line-height: 1;
  letter-spacing: 0;
  color: #fff;
  text-shadow: 0 2px 18px rgba(0, 0, 0, 0.18);
}

.source-note {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  max-width: 640px;
  color: #e8fffb;
}

.source-note span {
  padding: 9px 11px;
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 8px;
  background: rgba(13, 55, 64, 0.32);
  backdrop-filter: blur(12px);
}

.availability-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  padding: 18px 20px;
  border: 1px solid rgba(20, 125, 137, 0.18);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(244, 250, 250, 0.9)),
    linear-gradient(90deg, rgba(20, 125, 137, 0.08), rgba(240, 161, 74, 0.08));
  box-shadow: var(--soft-shadow);
}

.availability-panel h2 {
  margin: 3px 0 5px;
  color: var(--ink);
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: 0;
}

.availability-panel p {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}

.availability-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex: 0 0 auto;
  flex-wrap: wrap;
  gap: 10px;
}

.availability-actions span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.availability-actions button,
.availability-actions a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 13px;
  border-radius: 8px;
  font-weight: 900;
  text-decoration: none;
}

.availability-actions button {
  border: 0;
  color: #fff;
  background: linear-gradient(180deg, #176f78, var(--aqua-dark));
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(13, 89, 99, 0.16);
}

.availability-actions button:disabled {
  cursor: progress;
  opacity: 0.68;
}

.availability-actions a {
  color: var(--aqua-dark);
  border: 1px solid rgba(20, 125, 137, 0.34);
  background: #fff;
}

.need-panel {
  display: grid;
  gap: 8px;
  margin-bottom: 18px;
  padding: 16px 18px;
  border: 1px solid rgba(205, 222, 228, 0.86);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--soft-shadow);
}

.need-panel label {
  color: var(--ink);
  font-size: 14px;
}

.need-panel p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.5;
}

.workbench {
  display: grid;
  grid-template-columns: 312px minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}

.filters {
  position: sticky;
  top: 16px;
  display: grid;
  gap: 15px;
  padding: 18px;
  border: 1px solid rgba(205, 222, 228, 0.86);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}

label {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

input,
select,
textarea {
  width: 100%;
  min-height: 44px;
  font-size: 16px;
  padding: 0 12px;
  border: 1px solid #c8d8de;
  border-radius: 8px;
  color: var(--ink);
  background: linear-gradient(180deg, #fff, #fbfdfd);
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
}

textarea {
  min-height: 82px;
  resize: vertical;
  padding: 11px 12px;
  line-height: 1.5;
}

select {
  appearance: none;
  padding-right: 34px;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--aqua-dark) 50%),
    linear-gradient(135deg, var(--aqua-dark) 50%, transparent 50%),
    linear-gradient(180deg, #fff, #fbfdfd);
  background-position:
    calc(100% - 18px) 19px,
    calc(100% - 12px) 19px,
    0 0;
  background-size:
    6px 6px,
    6px 6px,
    100% 100%;
  background-repeat: no-repeat;
}

input:focus,
select:focus,
textarea:focus,
button:focus-visible,
a:focus-visible {
  outline: 3px solid rgba(20, 124, 134, 0.25);
  outline-offset: 2px;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-grid div {
  min-width: 0;
  padding: 14px;
  border: 1px solid #dbe8e8;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(239, 248, 247, 0.92)),
    var(--wash);
}

.stat-grid strong {
  display: block;
  min-height: 30px;
  color: var(--aqua-dark);
  font-size: 25px;
  line-height: 1.1;
}

.stat-grid span {
  color: var(--muted);
  font-size: 12px;
}

.results {
  min-width: 0;
}

.map {
  position: relative;
  height: 376px;
  border: 1px solid rgba(204, 220, 226, 0.92);
  border-radius: 8px;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(20, 124, 134, 0.14), rgba(240, 161, 74, 0.15)),
    #dfeaed;
  box-shadow: var(--shadow);
}

.fallback-map {
  padding: 14px;
}

.fallback-canvas {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 308px;
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 54% 48%, rgba(250, 247, 229, 0.98) 0 18%, transparent 19%),
    radial-gradient(ellipse at 62% 55%, rgba(205, 226, 185, 0.92) 0 20%, transparent 21%),
    radial-gradient(ellipse at 42% 59%, rgba(207, 228, 188, 0.9) 0 26%, transparent 27%),
    linear-gradient(135deg, #8ac2d0 0%, #d7eff2 46%, #98c8d7 100%);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
}

.fallback-canvas::before {
  content: "海陵岛片区";
  position: absolute;
  left: 18px;
  top: 16px;
  color: #2d6170;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.56);
  font-weight: 900;
}

.fallback-canvas::after {
  content: "";
  position: absolute;
  left: 22%;
  top: 18%;
  width: 54%;
  height: 62%;
  border: 2px solid rgba(255, 255, 255, 0.52);
  border-left-color: transparent;
  border-bottom-color: rgba(255, 255, 255, 0.28);
  border-radius: 52% 48% 45% 55%;
  transform: rotate(-10deg);
  pointer-events: none;
}

.fallback-pin {
  position: absolute;
  display: grid;
  justify-items: center;
  gap: 5px;
  min-width: 96px;
  color: var(--ink);
  text-decoration: none;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.fallback-pin strong {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 3px solid #fff;
  border-radius: 50%;
  color: #fff;
  background: linear-gradient(180deg, #d26f4d, var(--danger));
  box-shadow: 0 10px 22px rgba(54, 72, 80, 0.32);
}

.fallback-pin span {
  max-width: 124px;
  padding: 5px 8px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--soft-shadow);
  font-size: 12px;
  font-weight: 800;
  text-align: center;
}

.fallback-note {
  position: absolute;
  right: 18px;
  bottom: 14px;
  max-width: min(420px, calc(100% - 36px));
  padding: 8px 10px;
  border-radius: 8px;
  color: #31535b;
  background: rgba(255, 255, 255, 0.88);
  font-size: 12px;
  font-weight: 700;
  box-shadow: var(--soft-shadow);
}

.result-head {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  margin: 22px 0 15px;
}

.result-head h2 {
  margin: 0 0 4px;
  font-size: 26px;
}

.result-head p {
  margin: 0;
  color: var(--muted);
}

button {
  min-height: 44px;
  padding: 0 16px;
  border: 1px solid var(--aqua);
  border-radius: 8px;
  color: #fff;
  background: linear-gradient(180deg, #18909a, var(--aqua-dark));
  box-shadow: 0 10px 20px rgba(20, 125, 137, 0.22);
  cursor: pointer;
}

button:hover {
  background: var(--aqua-dark);
}

.cards {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.room-card {
  position: relative;
  display: grid;
  gap: 12px;
  min-width: 0;
  padding: 18px;
  border: 1px solid rgba(210, 225, 230, 0.92);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 253, 253, 0.98)),
    var(--panel);
  box-shadow: var(--soft-shadow);
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    border-color 160ms ease;
}

.room-card::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  border-radius: 8px 0 0 8px;
  background: linear-gradient(180deg, var(--aqua), var(--sun));
  opacity: 0.72;
}

.room-card:hover {
  border-color: rgba(20, 125, 137, 0.38);
  box-shadow: 0 18px 36px rgba(18, 42, 54, 0.13);
  transform: translateY(-2px);
}

.room-card.active {
  border-color: var(--sun);
  box-shadow: 0 16px 34px rgba(180, 104, 28, 0.18);
}

.card-main {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: start;
}

.project {
  margin-bottom: 7px;
  color: var(--aqua-dark);
  font-size: 13px;
  font-weight: 800;
}

h3 {
  margin-bottom: 8px;
  font-size: 20px;
  line-height: 1.25;
  letter-spacing: 0;
}

.meta,
.description {
  margin-bottom: 0;
  color: var(--muted);
  line-height: 1.55;
}

.description {
  display: -webkit-box;
  overflow: hidden;
  min-height: 0;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.sales-copy {
  margin: 0;
  padding: 10px 11px;
  border: 1px solid rgba(225, 152, 70, 0.22);
  border-radius: 8px;
  color: #6e4a21;
  background: linear-gradient(180deg, #fff8ed, #fffdf8);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.65;
}

.availability-card {
  display: none;
}

.availability-card.show {
  display: grid;
  gap: 9px;
  padding: 10px;
  border: 1px solid rgba(20, 125, 137, 0.18);
  border-radius: 8px;
  background: linear-gradient(180deg, #f8fcfc, #ffffff);
}

.availability-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.availability-card-head strong {
  color: var(--aqua-dark);
  font-size: 13px;
  line-height: 1.25;
}

.availability-card-head span {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.availability-source-link {
  width: fit-content;
  color: var(--aqua-dark);
  font-size: 12px;
  font-weight: 900;
  text-decoration: none;
  border-bottom: 1px solid rgba(20, 125, 137, 0.28);
}

.availability-days {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
  gap: 6px;
}

.availability-day {
  display: grid;
  gap: 3px;
  min-height: 46px;
  padding: 7px 5px;
  border-radius: 8px;
  text-align: center;
}

.availability-day em {
  color: inherit;
  font-style: normal;
  font-size: 11px;
  font-weight: 800;
}

.availability-day strong {
  color: inherit;
  font-size: 12px;
  line-height: 1.15;
}

.availability-day small {
  color: inherit;
  font-size: 10px;
  font-weight: 900;
  line-height: 1.1;
}

.availability-day.open {
  color: #19613a;
  border: 1px solid rgba(63, 125, 85, 0.18);
  background: #edf8ef;
}

.availability-day.full {
  color: #9a3d2b;
  border: 1px solid rgba(184, 77, 53, 0.16);
  background: #fff0ed;
}

.price-pill {
  flex: 0 0 auto;
  max-width: 150px;
  padding: 10px 12px;
  border-radius: 8px;
  color: #fff;
  background: linear-gradient(180deg, #176f78, var(--aqua-dark));
  font-weight: 800;
  line-height: 1.25;
  text-align: right;
  box-shadow: 0 10px 22px rgba(13, 89, 99, 0.24);
}

.price-pill small {
  display: block;
  color: rgba(255, 255, 255, 0.76);
  font-size: 11px;
  font-weight: 600;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.tag {
  padding: 5px 9px;
  border-radius: 999px;
  color: #285263;
  background: #e8f5f4;
  font-size: 12px;
  font-weight: 700;
}

.tag.sea {
  color: #174d31;
  background: #e7f2e8;
}

.price-table {
  display: grid;
  gap: 9px;
  max-height: 240px;
  overflow: auto;
  padding-right: 3px;
  scrollbar-color: #b8d0d5 transparent;
  scrollbar-width: thin;
}

.price-period {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid #dfebee;
  border-radius: 8px;
  background: linear-gradient(180deg, #ffffff, #fbfdfd);
  font-size: 13px;
}

.period-title {
  color: var(--aqua-dark);
  font-weight: 900;
}

.period-prices {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  gap: 7px;
}

.price-chip {
  display: grid;
  gap: 3px;
  min-height: 52px;
  padding: 8px 9px;
  border: 1px solid #e5eef0;
  border-radius: 8px;
  background: #f7fbfb;
}

.price-chip em {
  color: var(--muted);
  font-style: normal;
  font-size: 12px;
  font-weight: 700;
}

.price-chip strong {
  color: var(--coral);
  font-size: 15px;
  line-height: 1.1;
}

.card-actions {
  display: flex;
  gap: 10px;
}

.card-actions a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 13px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 800;
  transition:
    transform 140ms ease,
    box-shadow 140ms ease,
    background 140ms ease;
}

.card-actions a:hover {
  transform: translateY(-1px);
}

.map-link {
  color: #fff;
  background: linear-gradient(180deg, #4d9363, var(--leaf));
  box-shadow: 0 9px 18px rgba(63, 125, 85, 0.18);
}

.detail-link {
  color: var(--aqua-dark);
  border: 1px solid var(--aqua);
  background: linear-gradient(180deg, #fff, #f8fcfc);
}

.empty {
  grid-column: 1 / -1;
  padding: 42px;
  border: 1px dashed #b9c8ce;
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.72);
}

@media (max-width: 1080px) {
  .workbench {
    grid-template-columns: 1fr;
  }

  .filters {
    position: static;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .stat-grid {
    grid-column: 1 / -1;
  }
}

@media (max-width: 760px) {
  .shell {
    padding:
      max(14px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      max(22px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
  }

  .topbar,
  .availability-panel,
  .result-head {
    align-items: stretch;
    flex-direction: column;
  }

  .topbar {
    min-height: 188px;
    margin-bottom: 14px;
    padding: 22px;
    background-position: center;
  }

  h1 {
    font-size: 42px;
  }

  .eyebrow {
    font-size: 12px;
  }

  .source-note {
    justify-content: flex-start;
    gap: 7px;
  }

  .source-note span {
    max-width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    line-height: 1.35;
  }

  .availability-panel {
    gap: 14px;
    padding: 16px;
  }

  .need-panel {
    margin-bottom: 16px;
    padding: 14px;
  }

  .availability-panel h2 {
    font-size: 20px;
  }

  .availability-actions {
    justify-content: stretch;
  }

  .availability-actions span {
    width: 100%;
  }

  .availability-actions button,
  .availability-actions a {
    flex: 1 1 120px;
  }

  .workbench {
    gap: 16px;
  }

  .filters {
    gap: 12px;
    padding: 14px;
    box-shadow: 0 12px 28px rgba(17, 39, 51, 0.11);
  }

  label {
    gap: 7px;
    font-size: 12px;
  }

  input,
  select {
    min-height: 46px;
    border-radius: 8px;
  }

  .filters,
  .cards {
    grid-template-columns: 1fr;
  }

  .stat-grid {
    gap: 8px;
  }

  .stat-grid div {
    padding: 12px;
  }

  .stat-grid strong {
    min-height: 28px;
    font-size: 24px;
  }

  .map {
    height: 286px;
  }

  .fallback-canvas {
    min-height: 220px;
  }

  .fallback-pin {
    min-width: 44px;
  }

  .fallback-pin strong {
    width: 40px;
    height: 40px;
  }

  .fallback-pin span {
    display: none;
  }

  .fallback-note {
    left: 14px;
    right: 14px;
    bottom: 12px;
    max-width: none;
    font-size: 11px;
    line-height: 1.35;
    text-align: center;
  }

  .result-head {

  matchCount: document.querySelector("#matchCount"),
  priceRange: document.querySelector("#priceRange"),
  availabilitySummary: document.querySelector("#availabilitySummary"),
  availabilityUpdated: document.querySelector("#availabilityUpdated"),
  availabilityRefresh: document.querySelector("#availabilityRefresh"),
};

let map;
let markerLayer;
let useFallbackMap = false;
let activeId = "";
const isWeChat = /MicroMessenger/i.test(navigator.userAgent || "");
const BEILUO_SHARE_ID = "f95a367296605dd7a992601fd5855270";
const BEILUO_STATUS_API = "https://api.yunzhanggui.net/api/v2/hotel_room_share/get_room_status";
const availabilityState = {
  loading: false,
  error: "",
  innName: "北洛秘境",
  startDate: "",
  endDate: "",
  updatedAt: "",
  rows: [],
  byRoom: new Map(),
};
const qushuAvailabilityState = {
  meta: qushuDataset.meta || {},
  rows: [],
  byRoom: new Map(),
};

const yuan =
  typeof Intl !== "undefined" && Intl.NumberFormat
    ? new Intl.NumberFormat("zh-CN", {
        style: "currency",
        currency: "CNY",
        maximumFractionDigits: 0,
      })
    : {
        format(value) {
          return `¥${String(Math.round(Number(value) || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}`;
        },
      };

function unique(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-CN"));
}

function fillSelect(select, values, label) {
  select.innerHTML = "";
  select.append(new Option(label, ""));
  values.forEach((value) => select.append(new Option(value, value)));
}

function priceText(unit) {
  if (unit.minPrice == null) return "待询价";
  if (unit.minPrice === unit.maxPrice) return yuan.format(unit.minPrice);
  return `${yuan.format(unit.minPrice)}-${yuan.format(unit.maxPrice)}`;
}

function isBeiluo(unit) {
  return [unit.project, unit.sourceSheet, unit.address, unit.description].join(" ").includes("北洛");
}

function roomSearchText(unit) {
  return [
    unit.project,
    unit.sourceSheet,
    unit.address,
    unit.roomType,
    unit.productName,
    unit.roomNo,
    unit.description,
  ].join(" ");
}

function isQushuCandidate(unit) {
  const text = roomSearchText(unit);
  if (/趣墅|星空|忘情谷|山海梦泽|保利Q区|玛瑙湾|保利银滩/i.test(text)) return true;
  return roomLookupKeys(unit).some((key) => qushuAvailabilityState.byRoom.has(key));
}

function normalizeRoomKey(value) {
  return String(value || "")
    .replace(/[（）()号\s]/g, "")
    .replace(/-/g, "")
    .replace(/^0+/, "")
    .toLowerCase();
}

function roomKeyVariants(value) {
  const text = String(value || "").trim();
  const segmentTrimmed = text.replace(/\d+/g, (part) => String(Number(part)));
  return unique([text, segmentTrimmed, normalizeRoomKey(text), normalizeRoomKey(segmentTrimmed)]);
}

function extractRoomTokens(value) {
  const text = String(value || "").toUpperCase();
  return unique([
    ...text.matchAll(/[A-Z]{1,2}\d{1,4}(?:-\d{1,2})?/g),
    ...text.matchAll(/\d{1,2}-\d{1,2}/g),
  ].map((match) => match[0]));
}

function roomLookupKeys(unit) {
  const values = [unit.roomNo, unit.roomType, unit.productName, unit.description, unit.id];
  return unique(
    values.flatMap((value) => [
      ...roomKeyVariants(value),
      ...extractRoomTokens(value).flatMap((token) => roomKeyVariants(token)),
    ]),
  );
}

function roomRowKeys(row) {
  const values = [row.roomName, row.title, row.shortName, row.goodsSn];
  return unique(
    values.flatMap((value) => [
      ...roomKeyVariants(value),
      ...extractRoomTokens(value).flatMap((token) => roomKeyVariants(token)),
    ]),
  );
}

function formatDateShort(dateText) {
  const [, month, day] = String(dateText).match(/^\d{4}-(\d{2})-(\d{2})$/) || [];
  return month && day ? `${Number(month)}/${Number(day)}` : dateText;
}

function roomDayLabel(day) {
  if (!day) return "未知";
  if (day.statusLabel) return day.statusLabel;
  if (day.has_order_state === 2) return "可订";
  if (day.has_order_state === 1) return day.room_order_state || "满房";
  return day.room_order_state || "未知";
}

function isRoomAvailable(day) {
  return day && (day.has_order_state === 2 || day.available === true);
}

function amapLink(unit) {
  const keyword = encodeURIComponent(`${unit.address} ${unit.roomNo || unit.roomType}`);
  return `https://uri.amap.com/search?keyword=${keyword}&center=${unit.lng},${unit.lat}&city=阳江`;
}

function initFilters() {
  fillSelect(els.project, unique(units.map((unit) => unit.project)), "全部项目");
  fillSelect(els.area, unique(units.map((unit) => unit.area)), "全部片区");
  fillSelect(
    els.room,
    unique(units.map((unit) => unit.rooms).filter((value) => Number.isFinite(value))).map((value) => `${value}房`),
    "全部房间数",
  );
  els.sourceSummary.textContent = `${dataset.meta.sourceFile || "源表"}：${dataset.meta.totalUnits || units.length}套房源，${dataset.meta.generatedAt || ""}`;
}

function currentFilters() {
  return {
    keyword: els.keyword.value.trim().toLowerCase(),
    project: els.project.value,
    area: els.area.value,
    sea: els.sea.value,
    rooms: els.room.value ? Number.parseInt(els.room.value, 10) : null,
    sort: els.sort.value,
  };
}

function matchUnit(unit, filters) {
  if (filters.project && unit.project !== filters.project) return false;
  if (filters.area && unit.area !== filters.area) return false;
  if (filters.sea && unit.seaLevel !== filters.sea) return false;
  if (filters.rooms && unit.rooms !== filters.rooms) return false;
  if (!filters.keyword) return true;

  const haystack = [
    unit.project,
    unit.area,
    unit.roomType,
    unit.productName,
    unit.roomNo,
    unit.description,
    unit.nearSea,
    unit.features.join(" "),
    unit.sourceSheet,
  ]
    .join(" ")
    .toLowerCase();
  return haystack.includes(filters.keyword);
}

function sortUnits(list, mode) {
  const copy = [...list];
  copy.sort((a, b) => {
    const aMin = a.minPrice == null ? 999999 : a.minPrice;
    const bMin = b.minPrice == null ? 999999 : b.minPrice;
    const aMax = a.maxPrice == null ? -1 : a.maxPrice;
    const bMax = b.maxPrice == null ? -1 : b.maxPrice;
    const aRooms = a.rooms == null ? 0 : a.rooms;
    const bRooms = b.rooms == null ? 0 : b.rooms;
    if (mode === "priceDesc") return bMax - aMax;
    if (mode === "roomsDesc") return bRooms - aRooms || aMin - bMin;
    if (mode === "project") return a.project.localeCompare(b.project, "zh-CN") || aMin - bMin;
    return aMin - bMin;
  });
  return copy;
}

function renderStats(list) {
  els.matchCount.textContent = list.length;
  const prices = list.reduce((all, unit) => all.concat(unit.prices.map((price) => price.price)), []);
  if (!prices.length) {
    els.priceRange.textContent = "-";
    return;
  }
  els.priceRange.textContent = `${yuan.format(Math.min(...prices))}-${yuan.format(Math.max(...prices))}`;
}

function groupPricesByPeriod(prices) {
  return prices.reduce((groups, row) => {
    if (!groups[row.period]) groups[row.period] = [];
    groups[row.period].push(row);
    return groups;
  }, {});
}

function hasAny(text, words) {
  return words.some((word) => text.includes(word));
}

function parseCustomerNeed(value) {
  const text = String(value || "").trim();
  const normalized = text.toLowerCase();
  const peopleMatch = normalized.match(/(\d{1,3})\s*(人|位|大|个)/);
  const budgetMatch = normalized.match(/(?:预算|价格|价位|左右|以内|不超|控制在|大概)?\s*(\d{3,6})\s*(元|块|左右|以内|以下)?/);
  const wanted = [];
  [
    ["泳池", ["泳池", "私家池", "游泳"]],
    ["泡池", ["泡池", "温泉"]],
    ["KTV", ["ktv", "唱歌", "k歌"]],
    ["麻将", ["麻将", "打牌"]],
    ["厨房", ["厨房", "做饭", "煮饭"]],
    ["烧烤", ["烧烤", "烤肉", "烤炉", "碳烤"]],
    ["近海", ["近海", "靠海", "海边", "一线海", "看海"]],
    ["亲子", ["亲子", "小孩", "孩子", "家庭"]],
    ["团建", ["团建", "公司", "团队"]],
    ["拍照", ["拍照", "出片", "好看"]],
    ["安静", ["安静", "休息", "睡觉"]],
  ].forEach(([label, words]) => {
    if (hasAny(normalized, words)) wanted.push(label);
  });
  return {
    raw: text,
    people: peopleMatch ? Number(peopleMatch[1]) : null,
    budget: budgetMatch ? Number(budgetMatch[1]) : null,
    wanted: unique(wanted),
  };
}

function unitCapacity(unit) {
  const beds = Number(unit.beds) || 0;
  const rooms = Number(unit.rooms) || 0;
  return Math.max(beds * 2, rooms * 2, beds || rooms || 0);
}

function customerNeedSummary(need) {
  if (!need.raw) return "";
  const parts = [];
  if (need.people) parts.push(`${need.people}人`);
  if (need.budget) parts.push(`预算${yuan.format(need.budget)}左右`);
  if (need.wanted.length) parts.push(`偏好${need.wanted.join("、")}`);
  return parts.length ? `客户需求：${parts.join("，")}。` : `客户需求：${need.raw}。`;
}

function matchNeedReasons(unit, need, text) {
  const reasons = [];
  const capacity = unitCapacity(unit);
  if (need.people) {
    if (capacity >= need.people) reasons.push(`床位和空间能覆盖约${need.people}人入住`);
    else reasons.push(`人数偏满，建议作为备选或确认是否可加床`);
  }
  if (need.budget && unit.minPrice) {
    if (unit.minPrice <= need.budget) reasons.push(`最低报价在客户预算内`);
    else reasons.push(`价格高于预算，适合客户愿意升级体验时推荐`);
  }
  need.wanted.forEach((want) => {
    const matched =
      (want === "近海" && hasAny(text, ["近海", "海边", "海景", "一线海", "北洛", "银滩", "黄金海岸"])) ||
      (want === "亲子" && Number(unit.rooms) >= 4) ||
      (want === "团建" && Number(unit.rooms) >= 6) ||
      (want === "拍照" && hasAny(text, ["北洛", "星空", "泳池", "海景", "山海梦泽"])) ||
      (want === "安静" && hasAny(text, ["恒大", "北洛", "度假社区"])) ||
      hasAny(text, [want.toLowerCase()]);
    if (matched) reasons.push(`符合${want}需求`);
  });
  return unique(reasons).slice(0, 4);
}

function audienceText(unit) {
  const rooms = Number(unit.rooms) || 0;
  if (rooms >= 8) return "很适合公司团建、几家人包栋或朋友多人局";
  if (rooms >= 6) return "适合三四个家庭、朋友聚会或小团队出游";
  if (rooms >= 4) return "适合家庭亲子、两三家朋友轻松度假";
  return "适合小家庭或情侣朋友短住放松";
}

function sceneText(unit, text) {
  if (hasAny(text, ["北洛"])) return "北洛湾片区本身度假感强，拍照、看海和安排行程都比较省心";
  if (hasAny(text, ["敏捷"])) return "敏捷黄金海岸生活配套成熟，去海边和周边吃喝都方便";
  if (hasAny(text, ["恒大"])) return "恒大御景湾社区感更安静，适合想住得舒服、晚上好好休息的客人";
  if (hasAny(text, ["保利", "星空", "忘情谷", "山海梦泽", "玛瑙湾"])) return "保利银滩片区别墅氛围更明显，聚会、拍照和度假仪式感都比较好";
  return unit.nearSea || unit.area || "位置适合海陵岛度假";
}

function featureHighlights(unit, text) {
  const highlights = [];
  if (hasAny(text, ["泳池", "私家池"])) highlights.push("私享泳池");
  if (hasAny(text, ["泡池"])) highlights.push("泡池放松");
  if (hasAny(text, ["ktv", "KTV"])) highlights.push("KTV欢唱");
  if (hasAny(text, ["麻将"])) highlights.push("麻将娱乐");
  if (hasAny(text, ["厨房"])) highlights.push("厨房可做饭");
  if (hasAny(text, ["烧烤", "碳烤", "烤炉"])) highlights.push("烧烤聚餐");
  if (hasAny(text, ["滑梯"])) highlights.push("滑梯泳池");
  if (hasAny(text, ["海景", "一线海", "海边"])) highlights.push("看海更方便");
  return unique(highlights).slice(0, 4);
}

function composeSalesCopy(unit, need = parseCustomerNeed("")) {
  const text = [
    unit.project,
    unit.area,
    unit.nearSea,
    unit.roomType,
    unit.productName,
    unit.description,
    ...(unit.features || []),
  ]
    .join(" ")
    .toLowerCase();
  const roomBed = `${unit.rooms || "-"}房${unit.beds ? `${unit.beds}床` : ""}`;
  const highlights = featureHighlights(unit, text);
  const highlightText = highlights.length ? `，亮点是${highlights.join("、")}` : "";
  const priceHint = unit.minPrice ? `，当前报价从${yuan.format(unit.minPrice)}起` : "";
  if (need.raw) {
    const needReasons = matchNeedReasons(unit, need, text);
    const reasonText = needReasons.length ? `这套匹配点：${needReasons.join("、")}。` : "";
    return `${customerNeedSummary(need)}推荐这套${unit.project}${unit.roomNo ? ` ${unit.roomNo}` : ""}：${roomBed}${highlightText}${priceHint}。${reasonText}${sceneText(unit, text)}，可以跟客户说“这套不是单纯便宜，而是人数、玩法和位置都比较稳”。`;
  }
  return `推荐给${audienceText(unit)}：${roomBed}空间更好分配${highlightText}。${sceneText(unit, text)}${priceHint}，客户对比时可以主推“住得下、玩得开、位置省心”。`;
}

function availabilityForUnit(unit) {
  if (isBeiluo(unit)) {
    const keys = roomLookupKeys(unit);
    const row = keys.map((key) => availabilityState.byRoom.get(key)).find(Boolean);
    if (row) return row;
  }
  const qushuRow = roomLookupKeys(unit)
    .map((key) => qushuAvailabilityState.byRoom.get(key))
    .find(Boolean);
  return qushuRow || null;
}

function renderAvailabilityPanel() {
  if (!els.availabilitySummary || !els.availabilityUpdated) return;
  const rooms = availabilityState.rows.length;
  const availableToday = availabilityState.rows.filter((row) => isRoomAvailable(row.days[0])).length;
  const range =
    availabilityState.startDate && availabilityState.endDate
      ? `${formatDateShort(availabilityState.startDate)}-${formatDateShort(availabilityState.endDate)}`
      : "未来房态";
  const beiluoText = availabilityState.error && !rooms
    ? "北洛秘境：同步失败，可点北洛房态查看"
    : availabilityState.loading && !rooms
      ? "北洛秘境：同步中"
      : `${availabilityState.innName}：${rooms} 间，${range}，首日可订 ${availableToday} 间`;
  const qushuRooms = qushuAvailabilityState.rows.length;
  const qushuAvailable = qushuAvailabilityState.rows.filter((row) => isRoomAvailable(row.days[0])).length;
  const qushuRange =
    qushuAvailabilityState.meta.startDate && qushuAvailabilityState.meta.endDate
      ? `${formatDateShort(qushuAvailabilityState.meta.startDate)}-${formatDateShort(qushuAvailabilityState.meta.endDate)}`
      : "未来房态";
  const qushuText = qushuRooms
    ? `趣墅海陵岛：${qushuRooms} 套，${qushuRange}，首日可订 ${qushuAvailable} 套，含美篇`
    : "趣墅海陵岛：等待导入房态";
  els.availabilitySummary.textContent = `${beiluoText}；${qushuText}。`;
  els.availabilityUpdated.textContent = availabilityState.updatedAt
    ? `北洛更新 ${availabilityState.updatedAt}`
    : availabilityState.loading
      ? "同步中"
      : qushuAvailabilityState.meta.generatedAt
        ? `趣墅更新 ${qushuAvailabilityState.meta.generatedAt}`
        : "已同步";
}

function renderRoomAvailability(unit, container) {
  container.innerHTML = "";
  if (!isBeiluo(unit) && !isQushuCandidate(unit)) return;

  const row = availabilityForUnit(unit);
  container.classList.add("show");
  if (isBeiluo(unit) && availabilityState.error && !row) {
    container.innerHTML = '<div class="availability-card-head"><strong>实时房态</strong><span>同步失败</span></div>';
    return;
  }
  if (!row) {
    container.innerHTML = isBeiluo(unit) && availabilityState.loading
      ? '<div class="availability-card-head"><strong>实时房态</strong><span>同步中</span></div>'
      : '<div class="availability-card-head"><strong>实时房态</strong><span>未匹配到房号</span></div>';
    return;
  }

  const openDays = row.days.filter(isRoomAvailable).length;
  const articleLink = row.articleUrl
    ? `<a class="availability-source-link" href="${row.articleUrl}" target="_blank" rel="noreferrer">美篇</a>`
    : "";
  const cells = row.days
    .slice(0, 15)
    .map((day) => {
      const available = isRoomAvailable(day);
      const price = day.price ? `<small>${yuan.format(day.price)}</small>` : "";
      return `<span class="availability-day ${available ? "open" : "full"}"><em>${formatDateShort(day.date)}</em><strong>${roomDayLabel(day)}</strong>${price}</span>`;
    })
    .join("");
  container.innerHTML = `
    <div class="availability-card-head">
      <strong>实时房态 · ${row.source || "北洛"} · ${row.roomName}</strong>
      <span>${openDays}/${row.days.length} 天可订</span>
    </div>
    ${articleLink}
    <div class="availability-days">${cells}</div>
  `;
}

function renderCards(list) {
  els.cards.innerHTML = "";
  if (!list.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "没有匹配的房源，换个片区、项目或关键词试试。";
    els.cards.append(empty);
    return;
  }

  const customerNeed = parseCustomerNeed(els.customerNeed?.value || "");
  const fragment = document.createDocumentFragment();
  list.forEach((unit) => {
    const card = els.template.content.firstElementChild.cloneNode(true);
    card.dataset.id = unit.id;
    if (unit.id === activeId) card.classList.add("active");
    card.querySelector(".project").textContent = `${unit.project} · ${unit.area}`;
    card.querySelector("h3").textContent = unit.roomNo ? `${unit.roomType} · ${unit.roomNo}` : unit.roomType;
    card.querySelector(".meta").textContent = `${unit.nearSea} · ${unit.rooms || "-"}房${unit.beds ? ` · ${unit.beds}床` : ""} · ${unit.sourceSheet}`;

    const pill = card.querySelector(".price-pill");
    pill.innerHTML = `<small>报价区间</small>${priceText(unit)}`;

    const tags = card.querySelector(".tags");
    [unit.seaLevel === "beach" ? "海边" : unit.seaLevel === "near" ? "近海" : "片区近海", ...unit.features]
      .slice(0, 7)
      .forEach((tag) => {
        const span = document.createElement("span");
        span.className = `tag${tag.includes("海") ? " sea" : ""}`;
        span.textContent = tag;
        tags.append(span);
      });

    card.querySelector(".description").textContent = unit.description || unit.productName || unit.locationNote;
    card.querySelector(".sales-copy").textContent = composeSalesCopy(unit, customerNeed);
    renderRoomAvailability(unit, card.querySelector(".availability-card"));

    const table = card.querySelector(".price-table");
    if (unit.prices.length) {
      const groupedPrices = groupPricesByPeriod(unit.prices);
      Object.keys(groupedPrices).forEach((period) => {
        const group = document.createElement("div");
        group.className = "price-period";
        const rows = groupedPrices[period]
          .map((row) => `<span class="price-chip"><em>${row.dayType}</em><strong>${yuan.format(row.price)}</strong></span>`)
          .join("");
        group.innerHTML = `<div class="period-title">${period}</div><div class="period-prices">${rows}</div>`;
        table.append(group);
      });
    } else {
      const div = document.createElement("div");
      div.className = "price-period";
      div.innerHTML = "<span>源表未填写价格</span><span>需要人工确认</span><strong>待询价</strong>";
      table.append(div);
    }

    const mapLink = card.querySelector(".map-link");
    mapLink.href = amapLink(unit);
    if (isWeChat) mapLink.removeAttribute("target");
    mapLink.addEventListener("click", () => setActive(unit.id, false));

    const detailLink = card.querySelector(".detail-link");
    detailLink.href = unit.link || amapLink(unit);
    detailLink.textContent = unit.link ? "房型链接" : "地图搜索";
    if (isWeChat) detailLink.removeAttribute("target");

    card.addEventListener("mouseenter", () => setActive(unit.id, true));
    fragment.append(card);
  });
  els.cards.append(fragment);
}

function setActive(id, panMap) {
  activeId = id;
  document.querySelectorAll(".room-card").forEach((card) => card.classList.toggle("active", card.dataset.id === id));
  const unit = units.find((item) => item.id === id);
  if (panMap && unit && map) map.setView([unit.lat, unit.lng], Math.max(map.getZoom(), 13), { animate: true });
}

function initMap() {
  useFallbackMap = true;
  document.querySelector("#map").classList.add("fallback-map");
}

function renderFallbackMap(list) {
  const container = document.querySelector("#map");
  container.innerHTML = "";
  container.classList.add("fallback-map");

  const grouped = new Map();
  list.forEach((unit) => {
    const key = `${unit.project}-${unit.lat}-${unit.lng}`;
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(unit);
  });

  const groups = [...grouped.values()].map((group) => group[0]);
  const canvas = document.createElement("div");
  canvas.className = "fallback-canvas";
  const lngs = units.map((unit) => unit.lng);
  const lats = units.map((unit) => unit.lat);
  const minLng = Math.min(...lngs) - 0.02;
  const maxLng = Math.max(...lngs) + 0.02;
  const minLat = Math.min(...lats) - 0.015;
  const maxLat = Math.max(...lats) + 0.015;

  groups.forEach((unit) => {
    const count = grouped.get(`${unit.project}-${unit.lat}-${unit.lng}`).length;
    const pin = document.createElement("a");
    pin.className = "fallback-pin";
    pin.href = amapLink(unit);
    pin.target = "_blank";
    pin.rel = "noreferrer";
    if (isWeChat) pin.removeAttribute("target");
    pin.title = `${unit.project}：${count}套匹配房源，点击打开高德实时地图`;
    pin.style.left = `${((unit.lng - minLng) / (maxLng - minLng)) * 100}%`;
    pin.style.top = `${(1 - (unit.lat - minLat) / (maxLat - minLat)) * 100}%`;
    pin.innerHTML = `<strong>${count}</strong><span>${unit.project}</span>`;
    canvas.append(pin);
  });

  const note = document.createElement("div");
  note.className = "fallback-note";
  note.textContent = "点位按项目片区定位；点击点位打开高德实时地图。";
  container.append(canvas, note);
}

function renderMap(list) {
  if (useFallbackMap) {
    renderFallbackMap(list);
    return;
  }
}

function render() {
  const filters = currentFilters();
  const list = sortUnits(units.filter((unit) => matchUnit(unit, filters)), filters.sort);
  renderStats(list);
  if (els.needHint) {
    const need = parseCustomerNeed(els.customerNeed?.value || "");
    els.needHint.textContent = need.raw
      ? `${customerNeedSummary(need)}已按当前房型、价格、配套生成推荐话术。`
      : "填写客户人数、预算、想要的配套或出游场景后，每套房会自动生成更贴合客户的推荐话术。";
  }
  renderAvailabilityPanel();
  renderCards(list);
  renderMap(list);
}

function reset() {
  els.keyword.value = "";
  els.project.value = "";
  els.area.value = "";
  els.sea.value = "";
  els.room.value = "";
  els.sort.value = "priceAsc";
  if (els.customerNeed) els.customerNeed.value = "";
  activeId = "";
  render();
}

function buildQushuAvailabilityRows() {
  qushuAvailabilityState.rows = (qushuDataset.rooms || []).map((room) => ({
    source: room.source || "趣墅海陵岛",
    roomName: room.shortName || room.title || room.goodsSn || room.sysid || "趣墅房源",
    title: room.title || "",
    shortName: room.shortName || "",
    goodsSn: room.goodsSn || "",
    articleUrl: room.articleUrl || "",
    days: (room.days || []).map((day) => ({
      date: day.date,
      available: Boolean(day.available),
      statusLabel: day.status || (day.available ? "可订" : "满房"),
      price: day.price,
      inventory: day.inventory,
    })),
  }));
  qushuAvailabilityState.byRoom = new Map();
  qushuAvailabilityState.rows.forEach((row) => {
    roomRowKeys(row).forEach((key) => qushuAvailabilityState.byRoom.set(key, row));
  });
}

buildQushuAvailabilityRows();
initFilters();
initMap();
render();

function buildAvailabilityRows(roomStatus) {
  const rows = [];
  Object.values(roomStatus || {}).forEach((roomType) => {
    Object.values(roomType.room_list || {}).forEach((room) => {
      const days = Object.values(room.screen_list || {}).sort((a, b) => String(a.date).localeCompare(String(b.date)));
      rows.push({
        source: "北洛秘境",
        roomTypeName: roomType.room_type_name,
        roomName: room.room_name,
        cleanStatus: room.clean_status,
        days,
      });
    });
  });
  return rows;
}

function indexAvailabilityRows(rows) {
  availabilityState.byRoom = new Map();
  rows.forEach((row) => {
    roomRowKeys(row).forEach((key) => availabilityState.byRoom.set(key, row));
  });
}

async function syncBeiluoAvailability() {
  availabilityState.loading = true;
  availabilityState.error = "";
  renderAvailabilityPanel();
  if (els.availabilityRefresh) els.availabilityRefresh.disabled = true;

  try {
    const response = await fetch(BEILUO_STATUS_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json;charset=UTF-8",
        "X-Requested-With": "XMLHttpRequest",
        ua: "oms_h5",
        timestamp: String(Date.now()),
      },
      body: JSON.stringify({
        share_id: BEILUO_SHARE_ID,
        start_date: "",
        end_date: "",
      }),
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (data.ret_code !== 0) throw new Error(data.ret_msg || "房态接口返回异常");

    const info = data.ret_data || {};
    const rows = buildAvailabilityRows(info.room_status);
    availabilityState.innName = info.inn_name || "北洛秘境";
    availabilityState.startDate = info.current_date?.start_date || "";
    availabilityState.endDate = info.current_date?.end_date || "";
    availabilityState.updatedAt = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    availabilityState.rows = rows;
    indexAvailabilityRows(rows);
  } catch (error) {
    availabilityState.error = error.message || "同步失败";
  } finally {
    availabilityState.loading = false;
    if (els.availabilityRefresh) els.availabilityRefresh.disabled = false;
    render();
  }
}

[els.keyword, els.customerNeed, els.project, els.area, els.sea, els.room, els.sort]
  .filter(Boolean)
  .forEach((el) => el.addEventListener("input", render));
els.reset.addEventListener("click", reset);
if (els.availabilityRefresh) els.availabilityRefresh.addEventListener("click", syncBeiluoAvailability);
syncBeiluoAvailability();
setInterval(syncBeiluoAvailability, 5 * 60 * 1000);

    </script>
  </body>
