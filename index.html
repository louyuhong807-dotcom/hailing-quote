<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d5963" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>海陵岛查房报价</title>
    <style>
:root {
  color-scheme: light;
  --ink: #14212a;
  --muted: #627380;
  --line: #d6e2e6;
  --panel: #ffffff;
  --wash: #eef6f5;
  --aqua: #147d89;
  --aqua-dark: #0d5963;
  --sun: #f0a14a;
  --leaf: #3f7d55;
  --coral: #c96346;
  --danger: #b84d35;
  --sand: #f6eddc;
  --shadow: 0 18px 46px rgba(17, 39, 51, 0.13);
  --soft-shadow: 0 10px 24px rgba(22, 48, 60, 0.08);
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--ink);
  font-family:
    Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0 150px, transparent 151px),
    linear-gradient(135deg, #edf7f6 0%, #f8f5ed 45%, #eef5f7 100%);
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

button,
input,
select {
  font: inherit;
}

button,
a,
select,
input {
  -webkit-tap-highlight-color: transparent;
}

.shell {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding: 22px 24px 32px;
}

.topbar {
  position: relative;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  min-height: 176px;
  margin-bottom: 18px;
  padding: 30px 32px;
  border: 1px solid rgba(255, 255, 255, 0.68);
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(circle at 82% 28%, rgba(255, 230, 182, 0.56) 0 11%, transparent 12%),
    radial-gradient(ellipse at 76% 78%, rgba(255, 255, 255, 0.42) 0 9%, transparent 10%),
    linear-gradient(170deg, rgba(255, 255, 255, 0.18) 0 20%, transparent 21% 100%),
    linear-gradient(90deg, rgba(9, 63, 72, 0.94) 0%, rgba(20, 125, 137, 0.82) 50%, rgba(240, 161, 74, 0.42) 100%),
    linear-gradient(135deg, #0c5b68, #69b7bd 55%, #f2c68c);
  box-shadow: var(--shadow);
  isolation: isolate;
}

.topbar::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 56px;
  background:
    linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.22)),
    repeating-linear-gradient(175deg, rgba(255, 255, 255, 0.3) 0 2px, transparent 2px 18px);
  z-index: -1;
}

.eyebrow {
  margin: 0 0 6px;
  color: #d7f5f2;
  font-size: 13px;
  font-weight: 700;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 56px;
  line-height: 1;
  letter-spacing: 0;
  color: #fff;
  text-shadow: 0 2px 18px rgba(0, 0, 0, 0.18);
}

.source-note {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  max-width: 640px;
  color: #e8fffb;
}

.source-note span {
  padding: 9px 11px;
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 8px;
  background: rgba(13, 55, 64, 0.32);
  backdrop-filter: blur(12px);
}

.workbench {
  display: grid;
  grid-template-columns: 312px minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}

.filters {
  position: sticky;
  top: 16px;
  display: grid;
  gap: 15px;
  padding: 18px;
  border: 1px solid rgba(205, 222, 228, 0.86);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}

label {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

input,
select {
  width: 100%;
  min-height: 44px;
  font-size: 16px;
  padding: 0 12px;
  border: 1px solid #c8d8de;
  border-radius: 8px;
  color: var(--ink);
  background: linear-gradient(180deg, #fff, #fbfdfd);
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
}

select {
  appearance: none;
  padding-right: 34px;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--aqua-dark) 50%),
    linear-gradient(135deg, var(--aqua-dark) 50%, transparent 50%),
    linear-gradient(180deg, #fff, #fbfdfd);
  background-position:
    calc(100% - 18px) 19px,
    calc(100% - 12px) 19px,
    0 0;
  background-size:
    6px 6px,
    6px 6px,
    100% 100%;
  background-repeat: no-repeat;
}

input:focus,
select:focus,
button:focus-visible,
a:focus-visible {
  outline: 3px solid rgba(20, 124, 134, 0.25);
  outline-offset: 2px;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-grid div {
  min-width: 0;
  padding: 14px;
  border: 1px solid #dbe8e8;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(239, 248, 247, 0.92)),
    var(--wash);
}

.stat-grid strong {
  display: block;
  min-height: 30px;
  color: var(--aqua-dark);
  font-size: 25px;
  line-height: 1.1;
}

.stat-grid span {
  color: var(--muted);
  font-size: 12px;
}

.results {
  min-width: 0;
}

.map {
  position: relative;
  height: 376px;
  border: 1px solid rgba(204, 220, 226, 0.92);
  border-radius: 8px;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(20, 124, 134, 0.14), rgba(240, 161, 74, 0.15)),
    #dfeaed;
  box-shadow: var(--shadow);
}

.fallback-map {
  padding: 14px;
}

.fallback-canvas {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 308px;
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 54% 48%, rgba(250, 247, 229, 0.98) 0 18%, transparent 19%),
    radial-gradient(ellipse at 62% 55%, rgba(205, 226, 185, 0.92) 0 20%, transparent 21%),
    radial-gradient(ellipse at 42% 59%, rgba(207, 228, 188, 0.9) 0 26%, transparent 27%),
    linear-gradient(135deg, #8ac2d0 0%, #d7eff2 46%, #98c8d7 100%);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
}

.fallback-canvas::before {
  content: "海陵岛片区";
  position: absolute;
  left: 18px;
  top: 16px;
  color: #2d6170;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.56);
  font-weight: 900;
}

.fallback-canvas::after {
  content: "";
  position: absolute;
  left: 22%;
  top: 18%;
  width: 54%;
  height: 62%;
  border: 2px solid rgba(255, 255, 255, 0.52);
  border-left-color: transparent;
  border-bottom-color: rgba(255, 255, 255, 0.28);
  border-radius: 52% 48% 45% 55%;
  transform: rotate(-10deg);
  pointer-events: none;
}

.fallback-pin {
  position: absolute;
  display: grid;
  justify-items: center;
  gap: 5px;
  min-width: 96px;
  color: var(--ink);
  text-decoration: none;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.fallback-pin strong {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 3px solid #fff;
  border-radius: 50%;
  color: #fff;
  background: linear-gradient(180deg, #d26f4d, var(--danger));
  box-shadow: 0 10px 22px rgba(54, 72, 80, 0.32);
}

.fallback-pin span {
  max-width: 124px;
  padding: 5px 8px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--soft-shadow);
  font-size: 12px;
  font-weight: 800;
  text-align: center;
}

.fallback-note {
  position: absolute;
  right: 18px;
  bottom: 14px;
  max-width: min(420px, calc(100% - 36px));
  padding: 8px 10px;
  border-radius: 8px;
  color: #31535b;
  background: rgba(255, 255, 255, 0.88);
  font-size: 12px;
  font-weight: 700;
  box-shadow: var(--soft-shadow);
}

.result-head {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  margin: 22px 0 15px;
}

.result-head h2 {
  margin: 0 0 4px;
  font-size: 26px;
}

.result-head p {
  margin: 0;
  color: var(--muted);
}

button {
  min-height: 44px;
  padding: 0 16px;
  border: 1px solid var(--aqua);
  border-radius: 8px;
  color: #fff;
  background: linear-gradient(180deg, #18909a, var(--aqua-dark));
  box-shadow: 0 10px 20px rgba(20, 125, 137, 0.22);
  cursor: pointer;
}

button:hover {
  background: var(--aqua-dark);
}

.cards {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.room-card {
  position: relative;
  display: grid;
  gap: 12px;
  min-width: 0;
  padding: 18px;
  border: 1px solid rgba(210, 225, 230, 0.92);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 253, 253, 0.98)),
    var(--panel);
  box-shadow: var(--soft-shadow);
  transition:
    transform 160ms ease,
    box-shadow 160ms ease,
    border-color 160ms ease;
}

.room-card::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  border-radius: 8px 0 0 8px;
  background: linear-gradient(180deg, var(--aqua), var(--sun));
  opacity: 0.72;
}

.room-card:hover {
  border-color: rgba(20, 125, 137, 0.38);
  box-shadow: 0 18px 36px rgba(18, 42, 54, 0.13);
  transform: translateY(-2px);
}

.room-card.active {
  border-color: var(--sun);
  box-shadow: 0 16px 34px rgba(180, 104, 28, 0.18);
}

.card-main {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: start;
}

.project {
  margin-bottom: 7px;
  color: var(--aqua-dark);
  font-size: 13px;
  font-weight: 800;
}

h3 {
  margin-bottom: 8px;
  font-size: 20px;
  line-height: 1.25;
  letter-spacing: 0;
}

.meta,
.description {
  margin-bottom: 0;
  color: var(--muted);
  line-height: 1.55;
}

.description {
  display: -webkit-box;
  overflow: hidden;
  min-height: 0;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.price-pill {
  flex: 0 0 auto;
  max-width: 150px;
  padding: 10px 12px;
  border-radius: 8px;
  color: #fff;
  background: linear-gradient(180deg, #176f78, var(--aqua-dark));
  font-weight: 800;
  line-height: 1.25;
  text-align: right;
  box-shadow: 0 10px 22px rgba(13, 89, 99, 0.24);
}

.price-pill small {
  display: block;
  color: rgba(255, 255, 255, 0.76);
  font-size: 11px;
  font-weight: 600;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.tag {
  padding: 5px 9px;
  border-radius: 999px;
  color: #285263;
  background: #e8f5f4;
  font-size: 12px;
  font-weight: 700;
}

.tag.sea {
  color: #174d31;
  background: #e7f2e8;
}

.price-table {
  display: grid;
  gap: 6px;
  max-height: 210px;
  overflow: auto;
  padding-right: 3px;
  scrollbar-color: #b8d0d5 transparent;
  scrollbar-width: thin;
}

.price-row {
  display: grid;
  grid-template-columns: minmax(96px, 1.1fr) minmax(80px, 0.9fr) 76px;
  gap: 8px;
  align-items: center;
  padding: 8px 11px;
  border: 1px solid #dfebee;
  border-radius: 8px;
  background: linear-gradient(180deg, #ffffff, #fbfdfd);
  font-size: 13px;
}

.price-row strong {
  text-align: right;
  color: var(--coral);
}

.card-actions {
  display: flex;
  gap: 10px;
}

.card-actions a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 13px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 800;
  transition:
    transform 140ms ease,
    box-shadow 140ms ease,
    background 140ms ease;
}

.card-actions a:hover {
  transform: translateY(-1px);
}

.map-link {
  color: #fff;
  background: linear-gradient(180deg, #4d9363, var(--leaf));
  box-shadow: 0 9px 18px rgba(63, 125, 85, 0.18);
}

.detail-link {
  color: var(--aqua-dark);
  border: 1px solid var(--aqua);
  background: linear-gradient(180deg, #fff, #f8fcfc);
}

.empty {
  grid-column: 1 / -1;
  padding: 42px;
  border: 1px dashed #b9c8ce;
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.72);
}

@media (max-width: 1080px) {
  .workbench {
    grid-template-columns: 1fr;
  }

  .filters {
    position: static;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .stat-grid {
    grid-column: 1 / -1;
  }
}

@media (max-width: 760px) {
  .shell {
    padding:
      max(14px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      max(22px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
  }

  .topbar,
  .result-head {
    align-items: stretch;
    flex-direction: column;
  }

  .topbar {
    min-height: 188px;
    margin-bottom: 14px;
    padding: 22px;
    background-position: center;
  }

  h1 {
    font-size: 42px;
  }

  .eyebrow {
    font-size: 12px;
  }

  .source-note {
    justify-content: flex-start;
    gap: 7px;
  }

  .source-note span {
    max-width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    line-height: 1.35;
  }

  .workbench {
    gap: 16px;
  }

  .filters {
    gap: 12px;
    padding: 14px;
    box-shadow: 0 12px 28px rgba(17, 39, 51, 0.11);
  }

  label {
    gap: 7px;
    font-size: 12px;
  }

  input,
  select {
    min-height: 46px;
    border-radius: 8px;
  }

  .filters,
  .cards {
    grid-template-columns: 1fr;
  }

  .stat-grid {
    gap: 8px;
  }

  .stat-grid div {
    padding: 12px;
  }

  .stat-grid strong {
    min-height: 28px;
    font-size: 24px;
  }

  .map {
    height: 286px;
  }

  .fallback-canvas {
    min-height: 220px;
  }

  .fallback-pin {
    min-width: 44px;
  }

  .fallback-pin strong {
    width: 40px;
    height: 40px;
  }

  .fallback-pin span {
    display: none;
  }

  .fallback-note {
    left: 14px;
    right: 14px;
    bottom: 12px;
    max-width: none;
    font-size: 11px;
    line-height: 1.35;
    text-align: center;
  }

  .result-head {
    gap: 12px;
    margin: 18px 0 12px;
  }

  .result-head h2 {
    font-size: 24px;
  }

  .result-head p {
    font-size: 13px;
    line-height: 1.55;
  }

  button {
    width: 100%;
    min-height: 46px;
  }

  .card-main {
    display: grid;
    gap: 12px;
  }

  .price-pill {
    max-width: none;
    text-align: left;
  }

  .room-card {
    gap: 11px;
    padding: 16px;
  }

  .room-card:hover {
    transform: none;
  }

  h3 {
    font-size: 19px;
    line-height: 1.32;
    overflow-wrap: anywhere;
  }

  .project,
  .meta,
  .description {
    overflow-wrap: anywhere;
  }

  .description {
    -webkit-line-clamp: 3;
  }

  .price-table {
    max-height: none;
    overflow: visible;
    padding-right: 0;
  }

  .price-row {
    grid-template-columns: 1fr;
    gap: 4px;
    padding: 9px 10px;
  }

  .price-row strong {
    text-align: left;
    font-size: 15px;
  }

  .card-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .card-actions a {
    min-height: 44px;
    padding: 0 10px;
  }
}

@media (max-width: 430px) {
  body {
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.78) 0 120px, transparent 121px),
      linear-gradient(145deg, #eef8f6 0%, #f8f4ea 50%, #eef5f7 100%);
  }

  .topbar {
    min-height: 174px;
    padding: 20px;
  }

  h1 {
    font-size: 38px;
  }

  .source-note {
    display: grid;
  }

  .filters {
    padding: 12px;
  }

  .stat-grid {
    grid-template-columns: 1fr;
  }

  .stat-grid strong {
    font-size: 23px;
  }

  .map {
    height: 264px;
  }

  .fallback-map {
    padding: 10px;
  }

  .fallback-canvas {
    min-height: 206px;
  }

  .fallback-canvas::before {
    left: 14px;
    top: 12px;
    font-size: 14px;
  }

  .fallback-pin strong {
    width: 36px;
    height: 36px;
    border-width: 2px;
    font-size: 13px;
  }

  .room-card {
    padding: 15px;
  }

  .price-pill {
    font-size: 17px;
  }
}

@media (max-width: 360px) {
  .shell {
    padding:
      max(10px, env(safe-area-inset-top))
      max(10px, env(safe-area-inset-right))
      max(18px, env(safe-area-inset-bottom))
      max(10px, env(safe-area-inset-left));
  }

  .topbar {
    min-height: 160px;
    padding: 18px;
  }

  h1 {
    font-size: 34px;
  }

  .source-note span {
    font-size: 12px;
  }

  .map {
    height: 244px;
  }

  .fallback-canvas {
    min-height: 186px;
  }

  .card-actions {
    grid-template-columns: 1fr;
  }
}

</style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="海陵岛报价概览">
        <div>
          <p class="eyebrow">海陵岛房源报价</p>
          <h1>查房报价</h1>
        </div>
        <div class="source-note">
          <span id="sourceSummary">正在读取报价表...</span>
          <span>地图按项目片区定位</span>
        </div>
      </section>

      <section class="workbench">
        <aside class="filters" aria-label="筛选条件">
          <label>
            关键词
            <input id="keywordInput" type="search" placeholder="房号、房型、泳池、KTV..." />
          </label>

          <label>
            项目
            <select id="projectSelect"></select>
          </label>

          <label>
            片区
            <select id="areaSelect"></select>
          </label>

          <label>
            靠海
            <select id="seaSelect">
              <option value="">全部</option>
              <option value="beach">海边/一线海边</option>
              <option value="near">近海</option>
              <option value="area">片区近海</option>
            </select>
          </label>

          <label>
            房间数
            <select id="roomSelect"></select>
          </label>

          <label>
            排序
            <select id="sortSelect">
              <option value="priceAsc">低价优先</option>
              <option value="priceDesc">高价优先</option>
              <option value="roomsDesc">房间数多优先</option>
              <option value="project">项目分组</option>
            </select>
          </label>

          <div class="stat-grid">
            <div>
              <strong id="matchCount">0</strong>
              <span>匹配房源</span>
            </div>
            <div>
              <strong id="priceRange">-</strong>
              <span>报价区间</span>
            </div>
          </div>
        </aside>

        <section class="results" aria-label="房源报价结果">
          <div id="map" class="map" aria-label="海陵岛房源地图"></div>
          <div class="result-head">
            <div>
              <h2>房型与价格</h2>
              <p>价格、房型、房号、链接均绑定源表；位置为项目片区定位。</p>
            </div>
            <button id="resetButton" type="button">重置</button>
          </div>
          <div id="cards" class="cards"></div>
        </section>
      </section>

    <script>
const dataset = window.HAILING_QUOTE_DATA || { meta: {}, units: [] };
const units = dataset.units;

const els = {
  sourceSummary: document.querySelector("#sourceSummary"),
  keyword: document.querySelector("#keywordInput"),
  project: document.querySelector("#projectSelect"),
  area: document.querySelector("#areaSelect"),
  sea: document.querySelector("#seaSelect"),
  room: document.querySelector("#roomSelect"),
  sort: document.querySelector("#sortSelect"),
  reset: document.querySelector("#resetButton"),
  cards: document.querySelector("#cards"),
  template: document.querySelector("#cardTemplate"),
  matchCount: document.querySelector("#matchCount"),
  priceRange: document.querySelector("#priceRange"),
};

let map;
let markerLayer;
let useFallbackMap = false;
let activeId = "";
const isWeChat = /MicroMessenger/i.test(navigator.userAgent || "");

const yuan =
  typeof Intl !== "undefined" && Intl.NumberFormat
    ? new Intl.NumberFormat("zh-CN", {
        style: "currency",
        currency: "CNY",
        maximumFractionDigits: 0,
      })
    : {
        format(value) {
          return `¥${String(Math.round(Number(value) || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}`;
        },
      };

function unique(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-CN"));
}

function fillSelect(select, values, label) {
  select.innerHTML = "";
  select.append(new Option(label, ""));
  values.forEach((value) => select.append(new Option(value, value)));
}

function priceText(unit) {
  if (unit.minPrice == null) return "待询价";
  if (unit.minPrice === unit.maxPrice) return yuan.format(unit.minPrice);
  return `${yuan.format(unit.minPrice)}-${yuan.format(unit.maxPrice)}`;
}

function amapLink(unit) {
  const keyword = encodeURIComponent(`${unit.address} ${unit.roomNo || unit.roomType}`);
  return `https://uri.amap.com/search?keyword=${keyword}&center=${unit.lng},${unit.lat}&city=阳江`;
}

function initFilters() {
  fillSelect(els.project, unique(units.map((unit) => unit.project)), "全部项目");
  fillSelect(els.area, unique(units.map((unit) => unit.area)), "全部片区");
  fillSelect(
    els.room,
    unique(units.map((unit) => unit.rooms).filter((value) => Number.isFinite(value))).map((value) => `${value}房`),
    "全部房间数",
  );
  els.sourceSummary.textContent = `${dataset.meta.sourceFile || "源表"}：${dataset.meta.totalUnits || units.length}套房源，${dataset.meta.generatedAt || ""}`;
}

function currentFilters() {
  return {
    keyword: els.keyword.value.trim().toLowerCase(),
    project: els.project.value,
    area: els.area.value,
    sea: els.sea.value,
    rooms: els.room.value ? Number.parseInt(els.room.value, 10) : null,
    sort: els.sort.value,
  };
}

function matchUnit(unit, filters) {
  if (filters.project && unit.project !== filters.project) return false;
  if (filters.area && unit.area !== filters.area) return false;
  if (filters.sea && unit.seaLevel !== filters.sea) return false;
  if (filters.rooms && unit.rooms !== filters.rooms) return false;
  if (!filters.keyword) return true;

  const haystack = [
    unit.project,
    unit.area,
    unit.roomType,
    unit.productName,
    unit.roomNo,
    unit.description,
    unit.nearSea,
    unit.features.join(" "),
    unit.sourceSheet,
  ]
    .join(" ")
    .toLowerCase();
  return haystack.includes(filters.keyword);
}

function sortUnits(list, mode) {
  const copy = [...list];
  copy.sort((a, b) => {
    const aMin = a.minPrice == null ? 999999 : a.minPrice;
    const bMin = b.minPrice == null ? 999999 : b.minPrice;
    const aMax = a.maxPrice == null ? -1 : a.maxPrice;
    const bMax = b.maxPrice == null ? -1 : b.maxPrice;
    const aRooms = a.rooms == null ? 0 : a.rooms;
    const bRooms = b.rooms == null ? 0 : b.rooms;
    if (mode === "priceDesc") return bMax - aMax;
    if (mode === "roomsDesc") return bRooms - aRooms || aMin - bMin;
    if (mode === "project") return a.project.localeCompare(b.project, "zh-CN") || aMin - bMin;
    return aMin - bMin;
  });
  return copy;
}

function renderStats(list) {
  els.matchCount.textContent = list.length;
  const prices = list.reduce((all, unit) => all.concat(unit.prices.map((price) => price.price)), []);
  if (!prices.length) {
    els.priceRange.textContent = "-";
    return;
  }
  els.priceRange.textContent = `${yuan.format(Math.min(...prices))}-${yuan.format(Math.max(...prices))}`;
}

function renderCards(list) {
  els.cards.innerHTML = "";
  if (!list.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "没有匹配的房源，换个片区、项目或关键词试试。";
    els.cards.append(empty);
    return;
  }

  const fragment = document.createDocumentFragment();
  list.forEach((unit) => {
    const card = els.template.content.firstElementChild.cloneNode(true);
    card.dataset.id = unit.id;
    if (unit.id === activeId) card.classList.add("active");
    card.querySelector(".project").textContent = `${unit.project} · ${unit.area}`;
    card.querySelector("h3").textContent = unit.roomNo ? `${unit.roomType} · ${unit.roomNo}` : unit.roomType;
    card.querySelector(".meta").textContent = `${unit.nearSea} · ${unit.rooms || "-"}房${unit.beds ? ` · ${unit.beds}床` : ""} · ${unit.sourceSheet}`;

    const pill = card.querySelector(".price-pill");
    pill.innerHTML = `<small>报价区间</small>${priceText(unit)}`;

    const tags = card.querySelector(".tags");
    [unit.seaLevel === "beach" ? "海边" : unit.seaLevel === "near" ? "近海" : "片区近海", ...unit.features]
      .slice(0, 7)
      .forEach((tag) => {
        const span = document.createElement("span");
        span.className = `tag${tag.includes("海") ? " sea" : ""}`;
        span.textContent = tag;
        tags.append(span);
      });

    card.querySelector(".description").textContent = unit.description || unit.productName || unit.locationNote;

    const table = card.querySelector(".price-table");
    if (unit.prices.length) {
      unit.prices.forEach((row) => {
        const div = document.createElement("div");
        div.className = "price-row";
        div.innerHTML = `<span>${row.period}</span><span>${row.dayType}</span><strong>${yuan.format(row.price)}</strong>`;
        table.append(div);
      });
    } else {
      const div = document.createElement("div");
      div.className = "price-row";
      div.innerHTML = "<span>源表未填写价格</span><span>需要人工确认</span><strong>待询价</strong>";
      table.append(div);
    }

    const mapLink = card.querySelector(".map-link");
    mapLink.href = amapLink(unit);
    if (isWeChat) mapLink.removeAttribute("target");
    mapLink.addEventListener("click", () => setActive(unit.id, false));

    const detailLink = card.querySelector(".detail-link");
    detailLink.href = unit.link || amapLink(unit);
    detailLink.textContent = unit.link ? "房型链接" : "地图搜索";
    if (isWeChat) detailLink.removeAttribute("target");

    card.addEventListener("mouseenter", () => setActive(unit.id, true));
    fragment.append(card);
  });
  els.cards.append(fragment);
}

function setActive(id, panMap) {
  activeId = id;
  document.querySelectorAll(".room-card").forEach((card) => card.classList.toggle("active", card.dataset.id === id));
  const unit = units.find((item) => item.id === id);
  if (panMap && unit && map) map.setView([unit.lat, unit.lng], Math.max(map.getZoom(), 13), { animate: true });
}

function initMap() {
  useFallbackMap = true;
  document.querySelector("#map").classList.add("fallback-map");
}

function renderFallbackMap(list) {
  const container = document.querySelector("#map");
  container.innerHTML = "";
  container.classList.add("fallback-map");

  const grouped = new Map();
  list.forEach((unit) => {
    const key = `${unit.project}-${unit.lat}-${unit.lng}`;
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(unit);
  });

  const groups = [...grouped.values()].map((group) => group[0]);
  const canvas = document.createElement("div");
  canvas.className = "fallback-canvas";
  const lngs = units.map((unit) => unit.lng);
  const lats = units.map((unit) => unit.lat);
  const minLng = Math.min(...lngs) - 0.02;
  const maxLng = Math.max(...lngs) + 0.02;
  const minLat = Math.min(...lats) - 0.015;
  const maxLat = Math.max(...lats) + 0.015;

  groups.forEach((unit) => {
    const count = grouped.get(`${unit.project}-${unit.lat}-${unit.lng}`).length;
    const pin = document.createElement("a");
    pin.className = "fallback-pin";
    pin.href = amapLink(unit);
    pin.target = "_blank";
    pin.rel = "noreferrer";
    if (isWeChat) pin.removeAttribute("target");
    pin.title = `${unit.project}：${count}套匹配房源，点击打开高德实时地图`;
    pin.style.left = `${((unit.lng - minLng) / (maxLng - minLng)) * 100}%`;
    pin.style.top = `${(1 - (unit.lat - minLat) / (maxLat - minLat)) * 100}%`;
    pin.innerHTML = `<strong>${count}</strong><span>${unit.project}</span>`;
    canvas.append(pin);
  });

  const note = document.createElement("div");
  note.className = "fallback-note";
  note.textContent = "点位按项目片区定位；点击点位打开高德实时地图。";
  container.append(canvas, note);
}

function renderMap(list) {
  if (useFallbackMap) {
    renderFallbackMap(list);
    return;
  }
}

function render() {
  const filters = currentFilters();
  const list = sortUnits(units.filter((unit) => matchUnit(unit, filters)), filters.sort);
  renderStats(list);
  renderCards(list);
  renderMap(list);
}

function reset() {
  els.keyword.value = "";
  els.project.value = "";
  els.area.value = "";
  els.sea.value = "";
  els.room.value = "";
  els.sort.value = "priceAsc";
  activeId = "";
  render();
}

initFilters();
initMap();
render();

[els.keyword, els.project, els.area, els.sea, els.room, els.sort].forEach((el) => el.addEventListener("input", render));
els.reset.addEventListener("click", reset);

    </script>
